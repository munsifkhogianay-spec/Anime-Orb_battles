<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Anime Spheres</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d1a;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:10px;gap:8px}
#title{font-family:'Bangers',cursive;font-size:28px;letter-spacing:4px;color:#FAC775;text-shadow:2px 2px 0 #412402}
#matchup-lbl{font-family:'Bangers',cursive;font-size:17px;letter-spacing:2px;color:#555;min-height:22px;text-align:center}
#arena-wrap{position:relative;width:400px;height:400px;border:5px solid #1e1e30;border-radius:4px;overflow:hidden;flex-shrink:0}
canvas{display:block}
#msg{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-family:'Bangers',cursive;font-size:38px;color:#FAC775;text-shadow:3px 3px 0 #000,0 0 20px currentColor;pointer-events:none;opacity:0;z-index:9;letter-spacing:3px;white-space:nowrap;transition:opacity .08s;animation:msgPop .08s ease-out}
@keyframes msgPop{0%{transform:translate(-50%,-50%) scale(.6)}100%{transform:translate(-50%,-50%) scale(1)}}
#ov{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;background:rgba(5,5,18,.93);z-index:10;padding:8px;gap:4px;overflow:hidden}
#ov h2{font-family:'Bangers',cursive;font-size:24px;color:#FAC775;letter-spacing:3px}
.sub{color:#444;font-size:10px;margin-bottom:2px}
.picks-row{display:flex;gap:6px;width:100%;flex:1;min-height:0}
.pcol{display:flex;flex-direction:column;gap:3px;flex:1;min-height:0}
.pcol-label{color:#555;font-size:9px;letter-spacing:2px;text-transform:uppercase;text-align:center}
.psearch{width:100%;background:#111;border:1px solid #2a2a3a;border-radius:4px;color:#ccc;font-size:11px;padding:4px 6px;outline:none;font-family:'Nunito',sans-serif}
.psearch:focus{border-color:#5a5a8a}
.plist{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:2px;min-height:0;padding:2px}
.plist::-webkit-scrollbar{width:3px}
.plist::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:2px}
.pitem{width:100%;text-align:left;font-family:'Bangers',cursive;font-size:12px;letter-spacing:.8px;padding:5px 9px;border-radius:5px;border:2.5px solid transparent;cursor:pointer;transition:all .12s;color:#fff;opacity:.65;background:rgba(255,255,255,.04)}
.pitem:hover{opacity:.9;background:rgba(255,255,255,.08)}
.pitem.sel{opacity:1;border-color:#fff !important;background:rgba(255,255,255,.15) !important;box-shadow:0 0 8px rgba(255,255,255,.2)}
#fight-btn{font-family:'Bangers',cursive;font-size:17px;letter-spacing:2px;padding:6px 26px;background:#E24B4A;color:#fff;border:none;border-radius:7px;cursor:pointer;flex-shrink:0}
#fight-btn:hover{background:#A32D2D}
#bottom{width:400px;display:grid;grid-template-columns:1fr 1fr;gap:0}
.ccard{padding:7px 9px;border-top:3px solid #333;position:relative}
.cname{font-family:'Bangers',cursive;font-size:15px;letter-spacing:1px;margin-bottom:3px}
.hpwrap{height:9px;background:rgba(0,0,0,.4);border-radius:3px;margin-bottom:2px;overflow:hidden}
.hpbar{height:9px;border-radius:3px;transition:width .07s}
.hpbar.right{margin-left:auto}
.stxt{font-size:10px;opacity:.5;margin-bottom:4px;font-variant-numeric:tabular-nums}
.ab-row{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:2px}
.ab-row.right{justify-content:flex-end}
.abtag{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;position:relative;overflow:hidden;display:inline-block}
.abtag .cdov{position:absolute;top:0;left:0;height:100%;background:rgba(0,0,0,.55);transition:width .07s}
.abtag .lbl{position:relative;z-index:1;white-space:nowrap}
.pbar-wrap{height:3px;background:rgba(0,0,0,.3);border-radius:2px;margin-top:2px;overflow:hidden}
.pbar{height:3px;border-radius:2px;transition:width .1s}
/* screen shake */
@keyframes shake{0%,100%{transform:translate(0,0)}10%{transform:translate(-4px,2px)}20%{transform:translate(4px,-2px)}30%{transform:translate(-3px,3px)}40%{transform:translate(3px,-1px)}50%{transform:translate(-2px,2px)}60%{transform:translate(2px,-2px)}70%{transform:translate(-1px,1px)}80%{transform:translate(1px,-1px)}90%{transform:translate(-1px,0)}}
.screen-shake{animation:shake .25s ease-out}
</style>
</head>
<body>
<div id="title">ANIME SPHERES</div>
<div id="matchup-lbl">Select your fighters</div>
<div id="arena-wrap">
  <canvas id="cv" width="400" height="400"></canvas>
  <div id="msg"></div>
  <div id="ov">
    <h2>ANIME SPHERES</h2>
    <div class="sub">AUTO BATTLE · 25 FIGHTERS · UNIQUE ABILITIES</div>
    <div class="picks-row">
      <div class="pcol">
        <div class="pcol-label">◆ Fighter 1</div>
        <input class="psearch" id="s1" placeholder="search..." oninput="filterList(0,this.value)">
        <div class="plist" id="pg1"></div>
      </div>
      <div class="pcol">
        <div class="pcol-label">Fighter 2 ◆</div>
        <input class="psearch" id="s2" placeholder="search..." oninput="filterList(1,this.value)">
        <div class="plist" id="pg2"></div>
      </div>
    </div>
    <button id="fight-btn" onclick="startGame()">FIGHT!</button>
  </div>
</div>
<div id="bottom">
  <div class="ccard" id="card1">
    <div class="cname" id="cn1">—</div>
    <div class="hpwrap"><div class="hpbar" id="hb1" style="width:100%"></div></div>
    <div class="stxt" id="hs1">—</div>
    <div class="ab-row" id="ab1"></div>
    <div class="pbar-wrap"><div class="pbar" id="pbr1" style="width:0%"></div></div>
  </div>
  <div class="ccard" id="card2" style="text-align:right">
    <div class="cname" id="cn2">—</div>
    <div class="hpwrap"><div class="hpbar right" id="hb2" style="width:100%"></div></div>
    <div class="stxt" id="hs2">—</div>
    <div class="ab-row right" id="ab2"></div>
    <div class="pbar-wrap"><div class="pbar right" id="pbr2" style="width:0%;margin-left:auto"></div></div>
  </div>
</div>
<script>
const W=400,H=400;
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const arenaWrap=document.getElementById('arena-wrap');

// ── ranges
const MELEE=75,MID=160,FAR=9999;
function dst(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);}
function inR(s,e,r){return dst(s,e)<r+s.rad+e.rad;}
function addVfx(v){vfx.push(v);}
function pts(x,y,col,n,sp=3){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=.5+Math.random()*sp;parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-.6,life:14+Math.random()*14,col,sz:1+Math.random()*2.2});}}

// Enhanced burst particles
function boomPts(x,y,col,n,sp=6){
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2+Math.random()*.3,s=sp*.5+Math.random()*sp;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:20+Math.random()*20,col,sz:2+Math.random()*4,trail:true});
  }
}
// Shockwave ring helper
function shockwave(x,y,col,maxR=60){
  addVfx({type:'shockwave',x,y,col,life:22,maxLife:22,maxR});
}
// Screen shake
function screenShake(intensity=1){
  arenaWrap.classList.remove('screen-shake');
  void arenaWrap.offsetWidth;
  arenaWrap.classList.add('screen-shake');
  setTimeout(()=>arenaWrap.classList.remove('screen-shake'),260);
}

function flash(t,col='#FAC775'){
  const el=document.getElementById('msg');
  el.textContent=t;el.style.color=col;el.style.opacity=1;
  el.style.animation='none';void el.offsetWidth;el.style.animation='msgPop .08s ease-out';
  setTimeout(()=>el.style.opacity=0,700);
}

// damage — all values 5x the original
function dmg(s,v,col){
  const r=Math.round(v);if(r<=0)return;
  if(s.infinityOn){pts(s.x,s.y,'#4fa8d8',8);addVfx({type:'shockwave',x:s.x,y:s.y,col:'#4fa8d8',life:14,maxLife:14,maxR:40});return;}
  if(s.spBlock){s.spBlock=false;addVfx({type:'ring',x:s.x,y:s.y,life:14,maxLife:14,col:'#ffd700',r:s.rad+8});shockwave(s.x,s.y,'#ffd700',50);return;}
  if(s.loveTrainOn){pts(s.x,s.y,'#f0f0f0',6);return;}
  if(s.handBlock){s.handBlock=false;addVfx({type:'ring',x:s.x,y:s.y,life:14,maxLife:14,col:'#1a6a6a',r:s.rad+8});return;}
  const red=Math.round(r*(1-(s.d4c||0)));
  s.hp=Math.max(0,s.hp-red);s.hfl=7;
  s.dnums.push({x:s.x+(Math.random()-.5)*22,y:s.y-s.rad-4,v:red,life:38,a:1});
  // big hit effects
  if(red>200){shockwave(s.x,s.y,col,55);boomPts(s.x,s.y,col,12,7);}
  if(red>500){screenShake(1.5);}
}

function applyPoison(target,totalDmg,ticks,interval){
  let done=0;
  const iv=setInterval(()=>{
    if(done>=ticks||target.hp<=0){clearInterval(iv);return;}
    dmg(target,totalDmg/ticks,'#2e8b57');
    pts(target.x+(Math.random()-.5)*20,target.y+(Math.random()-.5)*20,'#2e8b57',2);
    done++;
  },interval);
}

// ══════════════════════════════════════════════════════════════
// CHARACTERS — all damage values multiplied 5x
// ══════════════════════════════════════════════════════════════
const CHARS=[

// ── NARUTO ──
{id:'naruto',label:'Naruto',sym:'N',color:'#e8541a',out:'#7a2800',
 maxHp:9000,spd:3.2,rad:22,
 aName:'Rasengan',aCol:'#4fa8d8',aTxt:'#001a2e',aCd:280,aRange:MELEE+30,
 pName:'Shadow Clone',pCol:'#f4a460',pTxt:'#3d1400',pMax:3,
 attack(s,e){
   if(!inR(s,e,MELEE+30))return false;
   flash('RASENGAN!!',s.color);
   const ox=s.x,oy=s.y,tx=e.x,ty=e.y;
   // Enhanced spiral vfx
   addVfx({type:'spiral',ox,oy,tx,ty,life:34,maxLife:34,col:'#4fa8d8'});
   addVfx({type:'beam',x:ox,y:oy,tx,ty,life:22,maxLife:22,col:'#4fa8d8',bw:18});
   let t=0;const iv=setInterval(()=>{t++;const p=t/28;
     pts(ox+(tx-ox)*p,oy+(ty-oy)*p,'#4fa8d8',5);
     pts(ox+(tx-ox)*p,oy+(ty-oy)*p,'#fff',2);
     if(t>=28){clearInterval(iv);
       dmg(e,140,'#4fa8d8'); // 5x
       boomPts(e.x,e.y,'#4fa8d8',18,8);
       shockwave(e.x,e.y,'#4fa8d8',65);
       screenShake();
     }
   },16);s.attackCount=(s.attackCount||0)+1;
   if(s.attackCount>=3){s.attackCount=0;CHARS[s.cidx].passive(s,e);}
   return true;
 },
 passive(s,e){
   pts(s.x,s.y,s.color,8);
   clones.push({x:s.x+(Math.random()-.5)*60,y:s.y+(Math.random()-.5)*60,
     vx:(Math.random()-.5)*1.5,vy:(Math.random()-.5)*1.5,r:12,
     life:400,col:s.color,out:s.out,owner:s,
     hp:s.maxHp*.10,maxHp:s.maxHp*.10,dmgMul:.10});
 }
},

// ── SASUKE ──
{id:'sasuke',label:'Sasuke',sym:'S',color:'#1a1a4a',out:'#c0392b',
 maxHp:8000,spd:3.8,rad:20,
 aName:'Chidori',aCol:'#7ecef4',aTxt:'#001a2e',aCd:260,aRange:MELEE+20,
 pName:'Sharingan',pCol:'#c0392b',pTxt:'#fff',pMax:100,
 attack(s,e){
   if(!inR(s,e,MELEE+20))return false;
   flash('CHIDORI!!','#7ecef4');
   const ox=s.x,oy=s.y,dx=e.x-s.x,dy=e.y-s.y,d=dst(s,e)||1;
   // Multiple lightning bolts
   for(let li=0;li<3;li++) setTimeout(()=>addVfx({type:'lightning',x:ox,y:oy,tx:e.x+(Math.random()-.5)*20,ty:e.y+(Math.random()-.5)*20,life:18,maxLife:18,col:'#7ecef4'}),li*60);
   let t=0;const iv=setInterval(()=>{t++;s.x=ox+dx/d*t*6;s.y=oy+dy/d*t*6;
     pts(s.x,s.y,'#7ecef4',5);pts(s.x,s.y,'#fff',2);
     if(t>=8||dst(s,e)<s.rad+e.rad){clearInterval(iv);
       dmg(e,160,s.color); // 5x
       boomPts(e.x,e.y,'#7ecef4',14,7);
       shockwave(e.x,e.y,'#7ecef4',55);
       screenShake();
       s.vx=-dx/d*5;s.vy=-dy/d*5;}
   },16);return true;
 },
 passive(s,e){
   s.atk=(s.atk||1)+0.30;
   addVfx({type:'ring',x:s.x,y:s.y,life:22,maxLife:22,col:'#c0392b',r:s.rad+12});
   shockwave(s.x,s.y,'#c0392b',45);
   pts(s.x,s.y,'#c0392b',10);
   setTimeout(()=>{s.atk=Math.max(1,s.atk-0.30);},4000);
 }
},

// ── GOKU ──
{id:'goku',label:'Goku',sym:'G',color:'#d97c2b',out:'#1a3a6e',
 maxHp:12000,spd:2.8,rad:26,
 aName:'Kamehameha',aCol:'#1a3a6e',aTxt:'#7ecef4',aCd:360,aRange:FAR,
 pName:'Zenkai Boost',pCol:'#1a3a6e',pTxt:'#7ecef4',pMax:100,
 attack(s,e){
   flash('KAMEHAMEHA!!','#7ecef4');
   const dx=e.x-s.x,dy=e.y-s.y,d=dst(s,e)||1;
   addVfx({type:'beam',x:s.x,y:s.y,tx:s.x+dx/d*500,ty:s.y+dy/d*500,life:65,maxLife:65,col:'#1a3a6e',bw:32});
   addVfx({type:'beam',x:s.x,y:s.y,tx:s.x+dx/d*500,ty:s.y+dy/d*500,life:55,maxLife:55,col:'#7ecef4',bw:14});
   // Charge-up burst
   addVfx({type:'burst',x:s.x,y:s.y,life:20,maxLife:20,col:'#7ecef4',br:s.rad+20});
   projs.push({x:s.x,y:s.y,vx:dx/d*9,vy:dy/d*9,rad:16,dmg:175,col:'#7ecef4',life:60,owner:s}); // 5x
   boomPts(s.x,s.y,'#1a3a6e',10,5);return true;
 },
 passive(s,e){
   s.atk=(s.atk||1)+0.5;
   addVfx({type:'burst',x:s.x,y:s.y,life:35,maxLife:35,col:'#d97c2b',br:s.rad+22});
   shockwave(s.x,s.y,'#d97c2b',70);
   boomPts(s.x,s.y,'#d97c2b',18,9);
   flash('ZENKAI!!','#d97c2b');
 }
},

// ── LUFFY ──
{id:'luffy',label:'Luffy',sym:'L',color:'#c0392b',out:'#6b2516',
 maxHp:10000,spd:3.0,rad:24,
 aName:'Gum Gum Pistol',aCol:'#6b2516',aTxt:'#ffc',aCd:220,aRange:MID,
 pName:'Gear 4th',pCol:'#1a1a4a',pTxt:'#ffc',pMax:100,
 attack(s,e){
   if(!inR(s,e,MID))return false;
   const dx=e.x-s.x,dy=e.y-s.y,d=dst(s,e)||1;
   projs.push({x:s.x,y:s.y,vx:dx/d*10,vy:dy/d*10,rad:12,dmg:90,col:'#c0392b',life:35,owner:s,type:'punch_proj'}); // 5x
   pts(s.x,s.y,s.color,4);
   addVfx({type:'speed_ring',x:s.x,y:s.y,col:'#c0392b',life:12,maxLife:12});
   return true;
 },
 passive(s,e){
   s.gearMode=420;s.rad=Math.round(s.baseRad*1.35);
   s.atk=(s.atk||1)+0.10;
   addVfx({type:'burst',x:s.x,y:s.y,life:32,maxLife:32,col:s.color,br:s.rad+18});
   shockwave(s.x,s.y,s.color,75);
   for(let i=0;i<16;i++){const a=(i/16)*Math.PI*2;parts.push({x:s.x,y:s.y,vx:Math.cos(a)*10,vy:Math.sin(a)*10-1,life:30,col:'#c0392b',sz:6});}
   flash('GEAR FOURTH!!',s.color);
   setTimeout(()=>{s.rad=s.baseRad;s.gearMode=0;s.atk=Math.max(1,s.atk-0.10);},6000);
 }
},

// ── ICHIGO ──
{id:'ichigo',label:'Ichigo',sym:'I',color:'#1a1a1a',out:'#888',
 maxHp:10000,spd:3.5,rad:21,
 aName:'Getsuga Tensho',aCol:'#333',aTxt:'#ccc',aCd:240,aRange:MID,
 pName:'Bankai',pCol:'#333',pTxt:'#ccc',pMax:100,
 attack(s,e){
   if(!inR(s,e,MID))return false;
   flash('GETSUGA TENSHO!!','#888');
   const base=Math.atan2(e.y-s.y,e.x-s.x);
   [[0,110,0],[-.28,85,80],[.28,85,160]].forEach(([off,d2,delay])=>{ // 5x
     setTimeout(()=>{const ang=base+off;
       projs.push({x:s.x,y:s.y,vx:Math.cos(ang)*7,vy:Math.sin(ang)*7,rad:14,dmg:d2,col:'#555',life:110,owner:s,type:'cres',rot:ang,off});
     },delay);
   });return true;
 },
 passive(s,e){
   s.atk=(s.atk||1)+0.5;
   addVfx({type:'burst',x:s.x,y:s.y,life:36,maxLife:36,col:'#333',br:s.rad+20});
   shockwave(s.x,s.y,'#888',65);
   boomPts(s.x,s.y,'#555',16,8);
   flash('BANKAI!!','#888');
 }
},

// ── VEGETA ──
{id:'vegeta',label:'Vegeta',sym:'V',color:'#2c3e7e',out:'#fff',
 maxHp:9000,spd:3.6,rad:21,
 aName:'Final Flash',aCol:'#fffde7',aTxt:'#1a2340',aCd:360,aRange:FAR,
 pName:'Super Saiyan',pCol:'#f5d020',pTxt:'#1a2340',pMax:100,
 attack(s,e){
   flash('FINAL FLASH!!','#f5d020');
   addVfx({type:'charge',owner:s,life:26,maxLife:26,col:'#fffde7'});
   // Big charge aura
   addVfx({type:'burst',x:s.x,y:s.y,life:22,maxLife:22,col:'#fffde7',br:s.rad+28});
   setTimeout(()=>{
     const dx=e.x-s.x,dy=e.y-s.y,d=dst(s,e)||1;
     addVfx({type:'beam',x:s.x,y:s.y,tx:s.x+dx/d*500,ty:s.y+dy/d*500,life:55,maxLife:55,col:'#fffde7',bw:38});
     addVfx({type:'beam',x:s.x,y:s.y,tx:s.x+dx/d*500,ty:s.y+dy/d*500,life:40,maxLife:40,col:'#fff',bw:12});
     shockwave(s.x,s.y,'#fffde7',80);
     projs.push({x:s.x,y:s.y,vx:dx/d*10,vy:dy/d*10,rad:20,dmg:225,col:'#fffde7',life:55,owner:s}); // 5x
   },420);return true;
 },
 passive(s,e){
   s.atk=(s.atk||1)+0.5;
   addVfx({type:'burst',x:s.x,y:s.y,life:34,maxLife:34,col:'#f5d020',br:s.rad+20});
   shockwave(s.x,s.y,'#f5d020',70);
   boomPts(s.x,s.y,'#f5d020',16,9);
   flash('SUPER SAIYAN!!','#f5d020');
 }
},

// ── GOJO ──
{id:'gojo',label:'Gojo',sym:'Go',color:'#f0f0f0',out:'#4fa8d8',
 maxHp:11000,spd:3.3,rad:23,
 aName:'Hollow Purple',aCol:'#7c5cbf',aTxt:'#fff',aCd:320,aRange:FAR,
 pName:'Infinity',pCol:'#4fa8d8',pTxt:'#fff',pMax:100,
 attack(s,e){
   flash('HOLLOW PURPLE!!','#7c5cbf');
   const ox=s.x,oy=s.y;
   addVfx({type:'hollow_purple',ox,oy,tx:e.x,ty:e.y,life:44,maxLife:44});
   let t=0;const iv=setInterval(()=>{t++;const p=t/36;
     pts(ox+(e.x-ox)*p,oy+(e.y-oy)*p,'#4fa8d8',3);
     pts(ox+(e.x-ox)*p,oy+(e.y-oy)*p,'#7c5cbf',3);
     if(t>=36){clearInterval(iv);
       dmg(e,210,'#7c5cbf'); // 5x
       boomPts(e.x,e.y,'#7c5cbf',22,10);
       boomPts(e.x,e.y,'#4fa8d8',14,7);
       shockwave(e.x,e.y,'#7c5cbf',80);
       screenShake(2);
     }
   },16);return true;
 },
 passive(s,e){
   if(s.timeStopVictim)return;
   s.infinityOn=true;
   addVfx({type:'infinity_shield',owner:s,life:180,maxLife:180,col:'#4fa8d8'});

// ─── ENGINE ──────────────────────────────────────────────────────────────────
let p1idx=0,p2idx=1,state=null,running=false,raf=null;
let parts=[],projs=[],clones=[],vfx=[];
// Trail buffer for motion trails
let trailBuf=[];

function hexAlpha(h,a){try{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}catch(e){return'transparent';}}
function lightText(h){try{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return(r*.299+g*.587+b*.114)>90?h:'#fff';}catch(e){return'#fff';}}

function buildLists(){
  [0,1].forEach(pi=>{
    const el=document.getElementById('pg'+(pi+1));el.innerHTML='';
    CHARS.forEach((c,i)=>{
      const b=document.createElement('button');
      b.className='pitem'+((pi===0?p1idx:p2idx)===i?' sel':'');
      b.style.background=hexAlpha(c.color,.22);
      b.style.borderColor=c.color;
      b.style.color='#fff';
      b.textContent=c.label;b.dataset.idx=i;
      b.onclick=()=>{
        if(pi===0)p1idx=i;else p2idx=i;
        document.querySelectorAll('#pg'+(pi+1)+' .pitem').forEach(x=>x.classList.remove('sel'));
        b.classList.add('sel');
      };
      el.appendChild(b);
    });
  });
}
function filterList(pi,q){
  document.querySelectorAll('#pg'+(pi+1)+' .pitem').forEach(b=>{
    b.style.display=b.textContent.toLowerCase().includes(q.toLowerCase())?'':'none';
  });
}
buildLists();

function mkSphere(def,x,y,isP2,cidx){
  return{x,y,vx:(isP2?-1:1)*(def.spd*.5+Math.random()*.7),vy:(Math.random()-.5)*1.5,
    rad:def.rad,baseRad:def.rad,color:def.color,out:def.out,sym:def.sym,
    hp:def.maxHp,maxHp:def.maxHp,spd:def.spd,atk:1,
    cidx,isP2,aCd:60+Math.random()*60,pCharge:0,
    dodging:0,frozen:false,gearMode:0,born:Date.now(),
    hfl:0,dnums:[],bbonus:0,ang:0,
    infinityOn:false,spBlock:false,berserk:false,handBlock:false,
    loveTrainOn:false,loveTrainTurns:0,d4c:0,
    timeStopActive:false,timeStopVictim:false,kamui:false,
    attackCount:0,prevX:x,prevY:y
  };
}

function startGame(){
  if(p1idx===p2idx)p2idx=(p1idx+1)%CHARS.length;
  const d1=CHARS[p1idx],d2=CHARS[p2idx];
  document.getElementById('matchup-lbl').textContent=d1.label+' VS '+d2.label;
  document.getElementById('matchup-lbl').style.color=d1.color;
  parts=[];projs=[];clones=[];vfx=[];trailBuf=[];
  const s1=mkSphere(d1,80,200,false,p1idx);
  const s2=mkSphere(d2,320,200,true,p2idx);
  state={s1,s2};
  buildBottomUI(s1,d1,s2,d2);
  document.getElementById('ov').style.display='none';
  running=true;if(raf)cancelAnimationFrame(raf);loop();
}

function buildBottomUI(s1,d1,s2,d2){
  ['1','2'].forEach(n=>{
    const s=n==='1'?s1:s2,d=n==='1'?d1:d2;
    const card=document.getElementById('card'+n);
    card.style.borderTopColor=d.color;card.style.background=hexAlpha(d.color,.07);
    document.getElementById('cn'+n).textContent=d.label;
    document.getElementById('cn'+n).style.color=d.color;
    document.getElementById('hb'+n).style.background=d.color;
    const ab=document.getElementById('ab'+n);ab.innerHTML='';
    const mk=(id,bg,fg,txt)=>{
      const wrap=document.createElement('span');wrap.className='abtag';wrap.id=id+'w';
      wrap.style.background=bg;wrap.style.color=fg;
      const cd=document.createElement('div');cd.className='cdov';cd.id=id;
      const lbl=document.createElement('span');lbl.className='lbl';lbl.textContent=txt;
      wrap.appendChild(cd);wrap.appendChild(lbl);ab.appendChild(wrap);
    };
    mk('acd'+n,d.aCol||d.color,d.aTxt||'#fff',d.aName);
    mk('pcd'+n,d.pCol||d.color,d.pTxt||'#fff','[P] '+d.pName);
    document.getElementById('pbr'+n).style.background=d.pCol||d.color;
  });
}

function loop(){if(!running)return;update();draw();raf=requestAnimationFrame(loop);}

function update(){
  const{s1,s2}=state;
  updSphere(s1,s2);updSphere(s2,s1);
  checkColl(s1,s2);
  updProjs(s1,s2);updClones(s1,s2);
  parts=parts.filter(p=>{p.life--;p.x+=p.vx;p.y+=p.vy;p.vy+=.12;
    if(p.heal&&p.owner)p.owner.hp=Math.min(p.owner.maxHp,p.owner.hp+.3);
    return p.life>0;});
  vfx=vfx.filter(v=>{v.life--;return v.life>0;});
  updUI(s1,s2);
  if(s1.hp<=0||s2.hp<=0)endGame(s1,s2);
}

function updSphere(s,e){
  s.prevX=s.x;s.prevY=s.y;
  s.ang+=.032;
  if(s.dodging>0){s.dodging--;s.x+=s.vx*.12;s.y+=s.vy*.12;bnc(s);
    tick_dnums(s);if(s.hfl>0)s.hfl--;return;}
  if(s.frozen||s.kamui){tick_dnums(s);if(s.hfl>0)s.hfl--;return;}
  if(s.gearMode>0)s.gearMode--;

  const sp=s.gearMode>0?s.spd*1.5:s.spd;
  const acCdMul=s.gearMode>0&&CHARS[s.cidx].id==='luffy'?0.7:1;
  const dx=e.x-s.x,dy=e.y-s.y,d=dst(s,e)||1;
  s.vx+=dx/d*.07;s.vy+=dy/d*.07;
  const m=Math.sqrt(s.vx*s.vx+s.vy*s.vy)||1;
  if(m>sp){s.vx=s.vx/m*sp;s.vy=s.vy/m*sp;}
  s.x+=s.vx;s.y+=s.vy;bnc(s);

  // motion trail
  const spd2=s.vx*s.vx+s.vy*s.vy;
  if(spd2>8){
    trailBuf.push({x:s.prevX,y:s.prevY,r:s.rad*.6,col:s.color,life:8,maxLife:8});
  }

  if(s.aCd>0)s.aCd--;
  else{
    const fired=CHARS[s.cidx].attack(s,e);
    const baseCd=CHARS[s.cidx].aCd;
    s.aCd=fired===false?18:Math.round(baseCd*acCdMul+(Math.random()*25|0));
  }

  const pDef=CHARS[s.cidx];
  const pMax=pDef.pMax||100;
  if(pDef.id!=='naruto'){
    const rate=s.hp<s.maxHp*.4?0.55:0.28;
    s.pCharge=Math.min(pMax,s.pCharge+rate);
    if(s.pCharge>=pMax){s.pCharge=0;pDef.passive(s,e);}
  }

  tick_dnums(s);if(s.hfl>0)s.hfl--;
}
function tick_dnums(s){s.dnums=s.dnums.filter(d=>{d.life--;d.y-=1.1;d.a=d.life/38;return d.life>0;});}

function bnc(s){
  const r=s.rad,isL=CHARS[s.cidx].id==='luffy';
  if(s.x-r<0){s.x=r;s.vx=Math.abs(s.vx);if(isL)s.bbonus++;}
  if(s.x+r>W){s.x=W-r;s.vx=-Math.abs(s.vx);if(isL)s.bbonus++;}
  if(s.y-r<0){s.y=r;s.vy=Math.abs(s.vy);if(isL)s.bbonus++;}
  if(s.y+r>H){s.y=H-r;s.vy=-Math.abs(s.vy);if(isL)s.bbonus++;}
}

function checkColl(s1,s2){
  const dx=s2.x-s1.x,dy=s2.y-s1.y,d=dst(s1,s2)||1;
  const mn=s1.rad+s2.rad;
  if(d<mn){
    const nx=dx/d,ny=dy/d,ov=(mn-d)/2;
    s1.x-=nx*ov;s1.y-=ny*ov;s2.x+=nx*ov;s2.y+=ny*ov;
    const rv=(s1.vx-s2.vx)*nx+(s1.vy-s2.vy)*ny;
    if(rv>0){s1.vx-=rv*nx*1.1;s1.vy-=rv*ny*1.1;s2.vx+=rv*nx*1.1;s2.vy+=rv*ny*1.1;}
    const base=4+Math.abs(rv)*1.4;
    // 5x collision damage
    let d1=(base*(s2.atk||1)+(s2.bbonus||0)*8)*(s2.gearMode>0?1.4:1)*5;
    let d2=(base*(s1.atk||1)+(s1.bbonus||0)*8)*(s1.gearMode>0?1.4:1)*5;
    dmg(s1,d2,s2.color);dmg(s2,d1,s1.color);
    s1.bbonus=0;s2.bbonus=0;
    // Enhanced collision burst
    const cx=(s1.x+s2.x)/2,cy=(s1.y+s2.y)/2;
    pts(cx,cy,'#fff',10);
    addVfx({type:'shockwave',x:cx,y:cy,col:'#fff',life:16,maxLife:16,maxR:45});
  }
}

function updProjs(s1,s2){
  projs=projs.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.type==='spin_ball'||p.type==='nail'||p.type==='bounce_nail')p.rot=(p.rot||0)+.38;

    if(p.type==='sha'){
      const tgt=p.target;
      const dx2=tgt.x-p.x,dy2=tgt.y-p.y,d2=Math.sqrt(dx2*dx2+dy2*dy2)||1;
      p.vx+=dx2/d2*.3;p.vy+=dy2/d2*.3;
      const m=Math.sqrt(p.vx*p.vx+p.vy*p.vy)||1;if(m>4){p.vx=p.vx/m*4;p.vy=p.vy/m*4;}
      // SHA smoke trail
      if(Math.random()<.3)pts(p.x,p.y,'#9b7fa8',2,1.5);
    }

    if(p.type==='bug'){
      const tgt=p.target;
      const dx2=tgt.x-p.x,dy2=tgt.y-p.y,d2=Math.sqrt(dx2*dx2+dy2*dy2)||1;
      p.vx+=dx2/d2*.2;p.vy+=dy2/d2*.2;
      const m=Math.sqrt(p.vx*p.vx+p.vy*p.vy)||1;if(m>5){p.vx=p.vx/m*5;p.vy=p.vy/m*5;}
    }

    if(p.type==='bounce_nail'){
      if(p.x-p.rad<0){p.x=p.rad;p.vx=Math.abs(p.vx);addVfx({type:'spark',x:p.x,y:p.y,col:'#3a7a3a',life:10,maxLife:10});}
      if(p.x+p.rad>W){p.x=W-p.rad;p.vx=-Math.abs(p.vx);addVfx({type:'spark',x:p.x,y:p.y,col:'#3a7a3a',life:10,maxLife:10});}
      if(p.y-p.rad<0){p.y=p.rad;p.vy=Math.abs(p.vy);addVfx({type:'spark',x:p.x,y:p.y,col:'#3a7a3a',life:10,maxLife:10});}
      if(p.y+p.rad>H){p.y=H-p.rad;p.vy=-Math.abs(p.vy);addVfx({type:'spark',x:p.x,y:p.y,col:'#3a7a3a',life:10,maxLife:10});}
    }

    // Fireball trail
    if(p.type==='fireball'&&Math.random()<.4){pts(p.x,p.y,'#d35400',3,2);pts(p.x,p.y,'#ffa500',2,1.5);}
    // Spin ball trail
    if(p.type==='spin_ball'&&Math.random()<.3)pts(p.x,p.y,'#b8860b',2,1.5);

    const tgt=p.owner===s1?s2:s1;
    if((p.x-tgt.x)**2+(p.y-tgt.y)**2<(tgt.rad+p.rad)**2){
      if(p.type==='sha'||p.type==='bomb_proj'){
        addVfx({type:'burst',x:tgt.x,y:tgt.y,life:26,maxLife:26,col:p.col,br:tgt.rad+28});
        shockwave(tgt.x,tgt.y,p.col,70);
        boomPts(tgt.x,tgt.y,p.col,18,9);
        screenShake(2);
        dmg(tgt,p.dmg,p.col);return false;
      }
      if(p.type==='bug'){
        applyPoison(tgt,900,8,500); // 5x
        addVfx({type:'ring',x:tgt.x,y:tgt.y,life:20,maxLife:20,col:'#2e8b57',r:tgt.rad+12});
        boomPts(tgt.x,tgt.y,'#2e8b57',10,6);
        return false;
      }
      // Impact effects for all projectiles
      pts(p.x,p.y,p.col,8);
      addVfx({type:'shockwave',x:p.x,y:p.y,col:p.col,life:12,maxLife:12,maxR:35});
      dmg(tgt,p.dmg,p.col);
      if(p.type!=='bounce_nail')return false;
    }
    return p.life>0&&p.x>-30&&p.x<W+30&&p.y>-30&&p.y<H+30;
  });
  trailBuf=trailBuf.filter(t=>{t.life--;return t.life>0;});
}

function updClones(s1,s2){
  clones=clones.filter(cl=>{
    cl.life--;
    const enemy=cl.owner===s1?s2:s1;
    const dx=enemy.x-cl.x,dy=enemy.y-cl.y,d=Math.sqrt(dx*dx+dy*dy)||1;
    cl.vx+=dx/d*.07;cl.vy+=dy/d*.07;
    const m=Math.sqrt(cl.vx*cl.vx+cl.vy*cl.vy)||1;
    if(m>3.2){cl.vx=cl.vx/m*3.2;cl.vy=cl.vy/m*3.2;}
    cl.x+=cl.vx;cl.y+=cl.vy;
    cl.x=Math.max(cl.r,Math.min(W-cl.r,cl.x));cl.y=Math.max(cl.r,Math.min(H-cl.r,cl.y));
    if((cl.x-enemy.x)**2+(cl.y-enemy.y)**2<(cl.r+enemy.rad)**2){
      dmg(enemy,Math.round(cl.owner.maxHp*.025),cl.col); // 5x
      boomPts(cl.x,cl.y,'#f4a460',8,5);
      return false;
    }
    return cl.life>0;
  });
}

// ─── DRAW ────────────────────────────────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,W,H);
  // Dynamic background with vignette
  ctx.fillStyle='#0e0e20';ctx.fillRect(0,0,W,H);
  // Grid
  for(let i=0;i<W;i+=40)for(let j=0;j<H;j+=40){ctx.fillStyle='rgba(255,255,255,.018)';ctx.fillRect(i,j,20,20);ctx.fillRect(i+20,j+20,20,20);}
  // Vignette overlay
  const vig=ctx.createRadialGradient(W/2,H/2,W*.25,W/2,H/2,W*.75);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,.55)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);

  // Motion trails
  trailBuf.forEach(t=>{
    ctx.globalAlpha=t.life/t.maxLife*.35;
    ctx.fillStyle=t.col;
    ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);ctx.fill();
  });ctx.globalAlpha=1;

  vfx.forEach(v=>drawVfx(v));ctx.globalAlpha=1;

  // clones
  clones.forEach(cl=>{
    if(cl.hp<=0)return;
    ctx.save();ctx.globalAlpha=.55;ctx.fillStyle=cl.col;ctx.strokeStyle=cl.out||'#888';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(cl.x,cl.y,cl.r,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle='#fff7';ctx.beginPath();ctx.arc(cl.x-cl.r*.25,cl.y-cl.r*.25,cl.r*.2,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });

  projs.forEach(p=>drawProj(p));

  // Particles (with trails for trail particles)
  parts.forEach(p=>{
    ctx.globalAlpha=p.life/28;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  if(!state.s1.kamui)drawSphere(state.s1);
  if(!state.s2.kamui)drawSphere(state.s2);

  // Damage numbers — bigger and more dramatic
  [state.s1,state.s2].forEach(s=>{
    s.dnums.forEach(d=>{
      const sz=d.v>400?18:d.v>150?15:13;
      ctx.globalAlpha=d.a;
      ctx.strokeStyle='#000';ctx.lineWidth=4;
      ctx.fillStyle=d.v>800?'#ff4400':d.v>300?'#FAC775':'#ff9090';
      ctx.font=`bold ${sz}px Bangers,cursive`;ctx.textAlign='center';ctx.textBaseline='top';
      ctx.strokeText('-'+d.v,d.x,d.y);ctx.fillText('-'+d.v,d.x,d.y);
      // Glow for large hits
      if(d.v>300){
        ctx.shadowBlur=12;ctx.shadowColor=ctx.fillStyle;
        ctx.fillText('-'+d.v,d.x,d.y);ctx.shadowBlur=0;
      }
    });ctx.globalAlpha=1;
  });
}

function drawVfx(v){
  const pct=1-v.life/v.maxLife;ctx.save();
  if(v.type==='shockwave'){
    const r=v.maxR*pct;
    ctx.globalAlpha=(1-pct)*.8;ctx.strokeStyle=v.col;ctx.lineWidth=3-pct*2;
    ctx.beginPath();ctx.arc(v.x,v.y,r,0,Math.PI*2);ctx.stroke();
    // Second inner ring
    ctx.globalAlpha=(1-pct)*.4;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(v.x,v.y,r*.65,0,Math.PI*2);ctx.stroke();
  }else if(v.type==='spark'){
    ctx.globalAlpha=1-pct;ctx.strokeStyle=v.col;ctx.lineWidth=2;
    for(let i=0;i<5;i++){const a=(i/5)*Math.PI*2+pct*8;ctx.beginPath();ctx.moveTo(v.x,v.y);ctx.lineTo(v.x+Math.cos(a)*(6+pct*10),v.y+Math.sin(a)*(6+pct*10));ctx.stroke();}
  }else if(v.type==='beam'){
    const dx=v.tx-v.x,dy=v.ty-v.y,d=Math.sqrt(dx*dx+dy*dy)||1;
    const len=d*Math.min(1,pct*2.4);
    ctx.translate(v.x,v.y);ctx.rotate(Math.atan2(dy,dx));
    const bw=v.bw||18;ctx.globalAlpha=Math.max(0,1-pct*1.05);
    // Outer glow
    ctx.fillStyle=v.col+'44';ctx.fillRect(0,-bw*1.4,len,bw*2.8);
    ctx.fillStyle=v.col+'88';ctx.fillRect(0,-bw*.9,len,bw*1.8);
    ctx.fillStyle=v.col;ctx.fillRect(0,-bw/2,len,bw);
    ctx.fillStyle='#fff';ctx.fillRect(0,-bw*.1,len,bw*.2);
  }else if(v.type==='lightning'){
    ctx.globalAlpha=.9-pct*.5;
    for(let pass=0;pass<3;pass++){
      ctx.strokeStyle=pass===0?'rgba(255,255,255,.6)':pass===1?v.col||'#7ecef4':'rgba(255,255,255,.9)';
      ctx.lineWidth=pass===0?4:pass===1?2.5:1;
      ctx.beginPath();ctx.moveTo(v.x,v.y);
      for(let i=1;i<=8;i++){const t=i/8;ctx.lineTo(v.x+(v.tx-v.x)*t+(Math.random()-.5)*22,v.y+(v.ty-v.y)*t+(Math.random()-.5)*22);}
      ctx.lineTo(v.tx,v.ty);ctx.stroke();
    }
    // Glow at endpoints
    ctx.fillStyle=v.col||'#7ecef4';ctx.globalAlpha=(1-pct)*.7;
    ctx.beginPath();ctx.arc(v.tx,v.ty,4,0,Math.PI*2);ctx.fill();
  }else if(v.type==='spiral'){
    const p=1-v.life/v.maxLife,cx=v.ox+(v.tx-v.ox)*p,cy=v.oy+(v.ty-v.oy)*p;
    for(let ring=0;ring<4;ring++){
      ctx.globalAlpha=(.9-ring*.18)*(1-pct*.25);ctx.strokeStyle=ring%2===0?v.col:'#fff';
      ctx.lineWidth=4-ring*.7;ctx.beginPath();ctx.arc(cx,cy,13+ring*10,0,Math.PI*2);ctx.stroke();
    }
    ctx.fillStyle='#fff';ctx.globalAlpha=(1-pct)*.95;ctx.beginPath();ctx.arc(cx,cy,9,0,Math.PI*2);ctx.fill();
  }else if(v.type==='burst'){
    const r=(v.br||20)+pct*70;ctx.globalAlpha=(1-pct)*.85;ctx.strokeStyle=v.col;ctx.lineWidth=4.5;ctx.beginPath();ctx.arc(v.x,v.y,r,0,Math.PI*2);ctx.stroke();
    // Radial spikes
    ctx.lineWidth=2;ctx.globalAlpha=(1-pct)*.45;
    for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;ctx.beginPath();ctx.moveTo(v.x+Math.cos(a)*r*.55,v.y+Math.sin(a)*r*.55);ctx.lineTo(v.x+Math.cos(a)*(r+12),v.y+Math.sin(a)*(r+12));ctx.stroke();}
    ctx.strokeStyle='#fff5';ctx.lineWidth=1.5;ctx.globalAlpha=(1-pct)*.22;ctx.beginPath();ctx.arc(v.x,v.y,r*.7,0,Math.PI*2);ctx.stroke();
  }else if(v.type==='charge'){
    const o=v.owner;
    for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2+pct*16,r=o.rad+10+pct*26;ctx.globalAlpha=(1-pct)*.9;ctx.fillStyle=v.col;ctx.beginPath();ctx.arc(o.x+Math.cos(a)*r,o.y+Math.sin(a)*r,5.5,0,Math.PI*2);ctx.fill();}
    // Central glow
    ctx.globalAlpha=(1-pct)*.35;ctx.fillStyle=v.col;ctx.beginPath();ctx.arc(o.x,o.y,o.rad+pct*14,0,Math.PI*2);ctx.fill();
  }else if(v.type==='ring'){
    ctx.globalAlpha=(1-pct)*.82;ctx.strokeStyle=v.col;ctx.lineWidth=3;ctx.beginPath();ctx.arc(v.x,v.y,(v.r||24)+pct*22,0,Math.PI*2);ctx.stroke();
  }else if(v.type==='slashx'){
    ctx.globalAlpha=1-pct;ctx.strokeStyle=v.col;ctx.lineWidth=4;
    const ss=26+pct*18;
    // Drop shadow slash
    ctx.shadowBlur=8;ctx.shadowColor=v.col;
    ctx.beginPath();ctx.moveTo(v.x-ss,v.y-ss);ctx.lineTo(v.x+ss,v.y+ss);ctx.stroke();
    ctx.beginPath();ctx.moveTo(v.x+ss,v.y-ss);ctx.lineTo(v.x-ss,v.y+ss);ctx.stroke();
    ctx.shadowBlur=0;
    // White core
    ctx.strokeStyle='#fff7';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(v.x-ss,v.y-ss);ctx.lineTo(v.x+ss,v.y+ss);ctx.stroke();
    ctx.beginPath();ctx.moveTo(v.x+ss,v.y-ss);ctx.lineTo(v.x-ss,v.y+ss);ctx.stroke();
  }else if(v.type==='punch'){
    ctx.globalAlpha=1-pct;
    ctx.shadowBlur=12;ctx.shadowColor=v.col;
    ctx.strokeStyle=v.col;ctx.lineWidth=5;ctx.beginPath();ctx.arc(v.x,v.y,11+pct*14,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff';ctx.globalAlpha=(1-pct)*.65;ctx.beginPath();ctx.arc(v.x,v.y,5,0,Math.PI*2);ctx.fill();
    // Radial lines
    ctx.strokeStyle=v.col;ctx.lineWidth=2;ctx.globalAlpha=(1-pct)*.5;
    for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;ctx.beginPath();ctx.moveTo(v.x+Math.cos(a)*8,v.y+Math.sin(a)*8);ctx.lineTo(v.x+Math.cos(a)*18,v.y+Math.sin(a)*18);ctx.stroke();}
  }else if(v.type==='hollow_purple'){
    const p=1-v.life/v.maxLife,cx=v.ox+(v.tx-v.ox)*p,cy=v.oy+(v.ty-v.oy)*p;
    ctx.globalAlpha=.92-pct*.5;
    // Glow aura
    ctx.shadowBlur=20;ctx.shadowColor='#7c5cbf';
    ctx.fillStyle='#4fa8d888';ctx.beginPath();ctx.arc(cx-10,cy,16+pct*5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#7c5cbf88';ctx.beginPath();ctx.arc(cx+10,cy,16+pct*5,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#4fa8d8';ctx.beginPath();ctx.arc(cx-10,cy,12+pct*4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#7c5cbf';ctx.beginPath();ctx.arc(cx+10,cy,12+pct*4,0,Math.PI*2);ctx.fill();
    if(pct>.6){ctx.fillStyle='#fff';ctx.globalAlpha=(pct-.6)/.4*.95;ctx.beginPath();ctx.arc(cx,cy,22+pct*22,0,Math.PI*2);ctx.fill();}
  }else if(v.type==='sword_arc'){
    const dx=v.tx-v.x,dy=v.ty-v.y,ang=Math.atan2(dy,dx);
    ctx.globalAlpha=1-pct;ctx.shadowBlur=12;ctx.shadowColor=v.col;
    ctx.strokeStyle=v.col;ctx.lineWidth=7;
    ctx.beginPath();for(let i=-7;i<=7;i++){const a=ang+i*.13,r=60+pct*30;i===-7?ctx.moveTo(v.x+Math.cos(a)*r,v.y+Math.sin(a)*r):ctx.lineTo(v.x+Math.cos(a)*r,v.y+Math.sin(a)*r);}
    ctx.stroke();ctx.shadowBlur=0;ctx.strokeStyle='#fff5';ctx.lineWidth=2.5;ctx.stroke();
  }else if(v.type==='time_stop'){
    ctx.globalAlpha=(1-pct)*.35;ctx.fillStyle='#1a1a5a';ctx.fillRect(0,0,W,H);
    // Ripple rings from center
    for(let r=0;r<3;r++){
      ctx.globalAlpha=(1-pct)*.12;ctx.strokeStyle='#ffd700';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(v.x,v.y,(pct+r*.12)*W,0,Math.PI*2);ctx.stroke();
    }
  }else if(v.type==='erase'){
    ctx.globalAlpha=1-pct;ctx.shadowBlur=10;ctx.shadowColor=v.col;
    ctx.strokeStyle=v.col;ctx.lineWidth=3.5;
    for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2;ctx.beginPath();ctx.moveTo(v.x,v.y);ctx.lineTo(v.x+Math.cos(a)*(24+pct*8),v.y+Math.sin(a)*(24+pct*8));ctx.stroke();}
    ctx.shadowBlur=0;
  }else if(v.type==='disc'){
    ctx.globalAlpha=1-pct;ctx.strokeStyle=v.col;ctx.lineWidth=3.5;
    ctx.shadowBlur=10;ctx.shadowColor=v.col;
    ctx.beginPath();ctx.ellipse((v.x+v.tx)/2,(v.y+v.ty)/2,Math.sqrt((v.tx-v.x)**2+(v.ty-v.y)**2)/2+6,9,Math.atan2(v.ty-v.y,v.tx-v.x),0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;
  }else if(v.type==='string_web'){
    ctx.globalAlpha=.72-pct*.55;ctx.strokeStyle=v.col;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(v.x,v.y);ctx.lineTo(v.tx,v.ty);ctx.stroke();
    ctx.lineWidth=1;ctx.globalAlpha=(.72-pct*.55)*.5;
    for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(v.x+(Math.random()-.5)*10,v.y+(Math.random()-.5)*10);ctx.lineTo(v.tx+(Math.random()-.5)*10,v.ty+(Math.random()-.5)*10);ctx.stroke();}
  }else if(v.type==='web_cage'){
    const o=v.owner;ctx.globalAlpha=.48+Math.sin(Date.now()*.03)*.15;
    ctx.strokeStyle=v.col;ctx.lineWidth=1.8;
    for(let i=0;i<10;i++){const a=(i/10)*Math.PI*2;ctx.beginPath();ctx.moveTo(o.x,o.y);ctx.lineTo(o.x+Math.cos(a)*(o.rad+16),o.y+Math.sin(a)*(o.rad+16));ctx.stroke();}
    ctx.beginPath();ctx.arc(o.x,o.y,o.rad+16,0,Math.PI*2);ctx.stroke();
  }else if(v.type==='love_train'){
    const o=v.owner;ctx.globalAlpha=.30+Math.sin(Date.now()*.01)*.1;
    // Layered rings
    for(let i=0;i<3;i++){
      ctx.strokeStyle=i===1?'#c8161e':v.col;ctx.lineWidth=4-i;
      ctx.beginPath();ctx.arc(o.x,o.y,o.rad+5+i*4,0,Math.PI*2);ctx.stroke();
    }
  }else if(v.type==='infinity_shield'){
    const o=v.owner;const beat=Math.sin(Date.now()*.02)*.5+.5;
    ctx.globalAlpha=.28+beat*.15;
    ctx.shadowBlur=16;ctx.shadowColor=v.col;
    ctx.strokeStyle=v.col;ctx.lineWidth=3+beat;
    ctx.beginPath();ctx.arc(o.x,o.y,o.rad+8,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;
    ctx.globalAlpha=.06+beat*.04;ctx.fillStyle=v.col;ctx.beginPath();ctx.arc(o.x,o.y,o.rad+8,0,Math.PI*2);ctx.fill();
  }else if(v.type==='kamui_warp'){
    ctx.globalAlpha=(pct<.5?pct*2:2-pct*2)*.9;
    ctx.shadowBlur=14;ctx.shadowColor=v.col;
    ctx.strokeStyle=v.col;ctx.lineWidth=2.5;
    const spins=8;
    for(let i=0;i<spins;i++){const a=(i/spins)*Math.PI*2+pct*12,r=22+pct*38;ctx.beginPath();ctx.moveTo(v.x,v.y);ctx.lineTo(v.x+Math.cos(a)*r,v.y+Math.sin(a)*r);ctx.stroke();}
    ctx.beginPath();ctx.arc(v.x,v.y,14+pct*24,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;
  }else if(v.type==='shrine_slash'){
    ctx.globalAlpha=1-pct;
    ctx.shadowBlur=15;ctx.shadowColor=v.col;
    ctx.strokeStyle=v.col;ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(0,v.y);ctx.lineTo(W,v.y);ctx.stroke();
    ctx.shadowBlur=0;
    ctx.strokeStyle='#fff6';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,v.y-3);ctx.lineTo(W,v.y-3);ctx.stroke();
    // Slash aftermath particles
    if(Math.random()<.4)pts(Math.random()*W,v.y+(Math.random()-.5)*6,v.col,2,2);
  }else if(v.type==='burn_aura'){
    const o=v.owner;if(!o||o.hp<=0)return;
    const flicker=Math.sin(Date.now()*.05)*.5+.5;
    ctx.globalAlpha=.28+flicker*.18;
    ctx.shadowBlur=12;ctx.shadowColor='#111';
    ctx.strokeStyle='#111';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(o.x,o.y,o.rad+5+flicker*4,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;
    // Fire wisps
    if(Math.random()<.35)pts(o.x+(Math.random()-.5)*o.rad*1.5,o.y+(Math.random()-.5)*o.rad*1.5,'#111',2,1.5);
  }else if(v.type==='coin_land'){
    if(v.life>15){
      ctx.globalAlpha=1-pct*.5;
      ctx.shadowBlur=10;ctx.shadowColor='#d4a017';
      ctx.fillStyle='#d4a017';ctx.beginPath();ctx.arc(v.x,v.y,6,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    } else {
      const ef=1-v.life/15;
      const r2=ef*50;ctx.globalAlpha=(1-ef)*.9;
      ctx.shadowBlur=18;ctx.shadowColor='#d4a017';
      ctx.strokeStyle='#d4a017';ctx.lineWidth=4;ctx.beginPath();ctx.arc(v.x,v.y,r2,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=0;
      if(!v.exploded){v.exploded=true;dmg(v.enemy,v.dmg,v.col);boomPts(v.x,v.y,'#d4a017',16,8);shockwave(v.x,v.y,'#d4a017',55);screenShake();}
    }
  }else if(v.type==='speed_ring'){
    ctx.globalAlpha=1-pct;ctx.strokeStyle=v.col;ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(v.x,v.y,20+pct*32,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();ctx.globalAlpha=1;
}

function drawProj(p){
  ctx.save();
  if(p.type==='cres'){
    ctx.translate(p.x,p.y);ctx.rotate(p.rot+p.off*.5);
    ctx.shadowBlur=10;ctx.shadowColor=p.col;
    ctx.strokeStyle=p.col;ctx.lineWidth=6;ctx.beginPath();ctx.arc(0,0,p.rad,.32,Math.PI-.32);ctx.stroke();
    ctx.shadowBlur=0;
    ctx.strokeStyle='#fff5';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,0,p.rad,.32,Math.PI-.32);ctx.stroke();
  }else if(p.type==='fireball'){
    // Pulsing fireball with glow
    const pulse=Math.sin(Date.now()*.02)*.15+.85;
    ctx.shadowBlur=20;ctx.shadowColor='#ffa500';
    ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.rad*pulse,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffa500';ctx.globalAlpha=.8;ctx.beginPath();ctx.arc(p.x,p.y,p.rad*.65,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffe0a0';ctx.globalAlpha=.6;ctx.beginPath();ctx.arc(p.x,p.y,p.rad*.35,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }else if(p.type==='slash_proj'){
    ctx.translate(p.x,p.y);ctx.rotate(Math.atan2(p.vy,p.vx));
    ctx.shadowBlur=12;ctx.shadowColor=p.col;
    ctx.strokeStyle=p.col;ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(-p.rad*2.5,0);ctx.lineTo(p.rad*2.5,0);ctx.stroke();
    ctx.shadowBlur=0;
    ctx.strokeStyle='#fff6';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-p.rad*2,-3);ctx.lineTo(p.rad*2,-3);ctx.stroke();
  }else if(p.type==='nail'||p.type==='bounce_nail'){
    ctx.translate(p.x,p.y);ctx.rotate(p.rot||0);
    if(p.type==='bounce_nail'){ctx.shadowBlur=12;ctx.shadowColor=p.col;}
    ctx.fillStyle=p.col;ctx.fillRect(-p.rad,-p.rad*.25,p.rad*2,p.rad*.5);
    ctx.fillStyle='#c8e8c8';ctx.fillRect(p.rad*.5,-p.rad*.12,p.rad*.55,p.rad*.24);
    if(p.type==='bounce_nail'){ctx.shadowBlur=0;ctx.strokeStyle=p.col;ctx.lineWidth=2;ctx.globalAlpha=.55;ctx.beginPath();ctx.arc(0,0,p.rad+5,0,Math.PI*2);ctx.stroke();}
  }else if(p.type==='spin_ball'){
    ctx.translate(p.x,p.y);ctx.rotate(p.rot||0);
    const isLarge=p.rad>18;
    if(isLarge){ctx.shadowBlur=16;ctx.shadowColor=p.col;}
    ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(0,0,p.rad,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#c8c8c8';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(-p.rad,0);ctx.lineTo(p.rad,0);ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,p.rad,.1,Math.PI-.1);ctx.stroke();
    ctx.fillStyle='#fff5';ctx.beginPath();ctx.arc(-p.rad*.32,-p.rad*.32,p.rad*.3,0,Math.PI*2);ctx.fill();
    if(isLarge)ctx.shadowBlur=0;
  }else if(p.type==='sha'){
    ctx.translate(p.x,p.y);ctx.rotate(p.rot||0);
    ctx.shadowBlur=14;ctx.shadowColor='#9b7fa8';
    ctx.fillStyle='#9b7fa8';ctx.beginPath();ctx.arc(0,0,p.rad,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#2c1a3a';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(0,0,p.rad,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff5';ctx.beginPath();ctx.arc(-p.rad*.3,-p.rad*.3,p.rad*.32,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#f5c6d0';ctx.lineWidth=2;
    for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*p.rad,Math.sin(a)*p.rad);ctx.stroke();}
  }else if(p.type==='bug'){
    ctx.shadowBlur=8;ctx.shadowColor='#2e8b57';
    ctx.fillStyle='#2e8b57';ctx.beginPath();ctx.arc(p.x,p.y,p.rad,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a5a30';ctx.beginPath();ctx.arc(p.x,p.y,p.rad*.5,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle='#97C459';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(p.x-p.rad,p.y);ctx.lineTo(p.x-p.rad-6,p.y-4);ctx.stroke();
    ctx.beginPath();ctx.moveTo(p.x+p.rad,p.y);ctx.lineTo(p.x+p.rad+6,p.y-4);ctx.stroke();
  }else if(p.type==='knife'){
    ctx.translate(p.x,p.y);ctx.rotate(Math.atan2(p.vy,p.vx));
    ctx.shadowBlur=8;ctx.shadowColor='#d4a017';
    ctx.fillStyle=p.col;ctx.fillRect(-10,-2.5,20,5);
    ctx.fillStyle='#fff9';ctx.fillRect(5,-1.8,5,3.6);
    ctx.shadowBlur=0;
  }else if(p.type==='punch_proj'){
    ctx.shadowBlur=12;ctx.shadowColor=p.col;
    ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.rad,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff';ctx.globalAlpha=.5;ctx.beginPath();ctx.arc(p.x,p.y,p.rad*.4,0,Math.PI*2);ctx.fill();
  }else{
    ctx.shadowBlur=10;ctx.shadowColor=p.col;
    ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.rad,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff';ctx.globalAlpha=.38;ctx.beginPath();ctx.arc(p.x,p.y,p.rad*.38,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();ctx.globalAlpha=1;
}

function drawSphere(s){
  const r=s.rad;ctx.save();ctx.translate(s.x,s.y);

  // Gear 4 aura
  if(s.gearMode>0){
    const pulse=Math.sin(Date.now()*.015)*.5+.5;ctx.strokeStyle=s.color;ctx.lineWidth=3+pulse*2;
    for(let i=0;i<4;i++){ctx.globalAlpha=.14+i*.04;ctx.beginPath();ctx.arc(0,0,r+8+i*9,0,Math.PI*2);ctx.stroke();}ctx.globalAlpha=1;
  }
  // Berserker glow
  if(s.berserk){
    ctx.globalAlpha=.2+Math.sin(Date.now()*.04)*.1;ctx.strokeStyle='#8b0000';ctx.lineWidth=5;
    ctx.beginPath();ctx.arc(0,0,r+5,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
  }

  if(s.dodging)ctx.globalAlpha=.4;

  // Shadow beneath sphere
  ctx.shadowBlur=s.hfl>0?25:14;
  ctx.shadowColor=s.hfl>0?'#ff2200':s.color;

  ctx.fillStyle=s.hfl>0?'#ffffff':s.color;
  ctx.strokeStyle=s.out;ctx.lineWidth=3.5;
  ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();ctx.stroke();

  ctx.shadowBlur=0;

  ctx.rotate(s.ang);ctx.fillStyle=s.out+'38';
  for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2;ctx.beginPath();ctx.arc(Math.cos(a)*r*.55,Math.sin(a)*r*.55,r*.2,0,Math.PI*2);ctx.fill();}
  ctx.rotate(-s.ang);

  // Specular highlight
  ctx.fillStyle='#ffffff95';ctx.beginPath();ctx.arc(-r*.28,-r*.28,r*.22,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffffff40';ctx.beginPath();ctx.arc(-r*.22,-r*.22,r*.36,0,Math.PI*2);ctx.fill();

  ctx.globalAlpha=1;ctx.fillStyle=s.hfl>0?s.color:s.out;
  const fs=s.sym.length>1?Math.round(r*.56):Math.round(r*.74);
  ctx.font=`bold ${fs}px Bangers,cursive`;ctx.textAlign='center';ctx.textBaseline='middle';
  // Text shadow
  ctx.shadowBlur=4;ctx.shadowColor='rgba(0,0,0,.8)';
  ctx.fillText(s.sym,0,1);ctx.shadowBlur=0;

  ctx.restore();

  // HP bar
  const hw=r*2.3,hh=9,hx=s.x-hw/2,hy=s.y+r+4;
  ctx.fillStyle='rgba(0,0,0,.32)';ctx.fillRect(hx,hy,hw,hh);
  const fr=Math.max(0,s.hp/s.maxHp);
  ctx.fillStyle=fr>.5?s.color:fr>.25?'#EF9F27':'#E24B4A';
  ctx.fillRect(hx,hy,hw*fr,hh);
  ctx.strokeStyle='rgba(0,0,0,.55)';ctx.lineWidth=1;ctx.strokeRect(hx,hy,hw,hh);
  ctx.strokeStyle='#000';ctx.lineWidth=2.5;ctx.fillStyle=fr>.3?'#fff':'#ffcccc';
  ctx.font='bold 11px Nunito';ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.strokeText(Math.ceil(s.hp),s.x,hy-1);ctx.fillText(Math.ceil(s.hp),s.x,hy-1);
}

function updUI(s1,s2){
  [[s1,'1'],[s2,'2']].forEach(([s,n])=>{
    const fr=Math.max(0,s.hp/s.maxHp);
    document.getElementById('hb'+n).style.width=(fr*100)+'%';
    document.getElementById('hs'+n).textContent=Math.ceil(s.hp)+' / '+s.maxHp;
    const acd=document.getElementById('acd'+n);
    if(acd)acd.style.width=(Math.max(0,s.aCd/CHARS[s.cidx].aCd)*100)+'%';
    const pDef=CHARS[s.cidx];
    const pMax=pDef.pMax||100;
    const pFr=pDef.id==='naruto'?(s.attackCount||0)/3:Math.min(1,s.pCharge/pMax);
    const pcd=document.getElementById('pcd'+n);
    if(pcd)pcd.style.width=((1-pFr)*100)+'%';
    const pbr=document.getElementById('pbr'+n);
    if(pbr)pbr.style.width=(pFr*100)+'%';
  });
}

function endGame(s1,s2){
  running=false;
  const w=s1.hp>s2.hp?s1:s2;const def=CHARS[w.cidx];
  const ov=document.getElementById('ov');ov.style.display='flex';
  ov.innerHTML=`
    <div style="font-family:Bangers,cursive;font-size:26px;color:${def.color};letter-spacing:3px;margin-bottom:4px">${def.label} WINS!</div>
    <div style="color:#555;font-size:11px;margin-bottom:8px">${Math.ceil(w.hp)} HP remaining</div>
    <div style="width:85%;height:12px;background:rgba(0,0,0,.3);border-radius:4px;overflow:hidden;margin-bottom:10px">
      <div style="height:100%;background:${def.color};width:${Math.round(w.hp/w.maxHp*100)}%;border-radius:4px"></div>
    </div>
    <button onclick="resetMenu()" style="font-family:Bangers,cursive;font-size:17px;letter-spacing:2px;padding:6px 26px;background:${def.color};color:${def.out};border:none;border-radius:7px;cursor:pointer">REMATCH</button>
  `;
}

function resetMenu(){
  running=false;parts=[];projs=[];clones=[];vfx=[];trailBuf=[];ctx.clearRect(0,0,W,H);
  const ov=document.getElementById('ov');ov.style.display='flex';
  ov.innerHTML=`
    <h2>ANIME SPHERES</h2>
    <div class="sub">AUTO BATTLE · 25 FIGHTERS · UNIQUE ABILITIES</div>
    <div class="picks-row">
      <div class="pcol"><div class="pcol-label">◆ Fighter 1</div><input class="psearch" id="s1" placeholder="search..." oninput="filterList(0,this.value)"><div class="plist" id="pg1"></div></div>
      <div class="pcol"><div class="pcol-label">Fighter 2 ◆</div><input class="psearch" id="s2" placeholder="search..." oninput="filterList(1,this.value)"><div class="plist" id="pg2"></div></div>
    </div>
    <button id="fight-btn" onclick="startGame()">FIGHT!</button>
  `;
  buildLists();
}
</script>
