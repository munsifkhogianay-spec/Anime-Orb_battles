<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Anime Spheres</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d1a;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:10px;gap:8px}
#title{font-family:'Bangers',cursive;font-size:28px;letter-spacing:4px;color:#FAC775;text-shadow:2px 2px 0 #412402}
#matchup-lbl{font-family:'Bangers',cursive;font-size:17px;letter-spacing:2px;color:#555;min-height:22px;text-align:center}

#arena-wrap{position:relative;width:400px;height:400px;border:5px solid #1e1e30;border-radius:4px;overflow:hidden;flex-shrink:0}
canvas{display:block}
#msg{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-family:'Bangers',cursive;font-size:36px;color:#FAC775;text-shadow:3px 3px 0 #000;pointer-events:none;opacity:0;z-index:9;letter-spacing:3px;white-space:nowrap;transition:opacity .1s}

/* SELECTION OVERLAY */
#ov{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;background:rgba(5,5,18,.93);z-index:10;padding:8px;gap:4px;overflow:hidden}
#ov h2{font-family:'Bangers',cursive;font-size:24px;color:#FAC775;letter-spacing:3px}
#ov .sub{color:#444;font-size:10px;margin-bottom:2px}
.picks-row{display:flex;gap:6px;width:100%;flex:1;min-height:0}
.pcol{display:flex;flex-direction:column;gap:3px;flex:1;min-height:0}
.pcol-label{color:#555;font-size:9px;letter-spacing:2px;text-transform:uppercase;text-align:center}
.psearch{width:100%;background:#111;border:1px solid #2a2a3a;border-radius:4px;color:#ccc;font-size:11px;padding:4px 6px;font-family:'Nunito',sans-serif;outline:none}
.psearch:focus{border-color:#4a4a6a}
.plist{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:1px;min-height:0}
.plist::-webkit-scrollbar{width:3px}
.plist::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:2px}
.pitem{width:100%;text-align:left;font-family:'Bangers',cursive;font-size:12px;letter-spacing:.8px;padding:4px 8px;border-radius:4px;border:2px solid transparent;cursor:pointer;transition:opacity .1s,border-color .1s;color:#fff;opacity:.72}
.pitem:hover{opacity:1}
.pitem.sel{border-color:#fff!important;opacity:1}
#fight-btn{font-family:'Bangers',cursive;font-size:17px;letter-spacing:2px;padding:6px 26px;background:#E24B4A;color:#fff;border:none;border-radius:7px;cursor:pointer;flex-shrink:0}
#fight-btn:hover{background:#A32D2D}

/* BOTTOM UI */
#bottom{width:400px;display:grid;grid-template-columns:1fr 1fr;gap:0}
.ccard{padding:7px 9px;border-top:3px solid #333;position:relative}
.cname{font-family:'Bangers',cursive;font-size:15px;letter-spacing:1px;margin-bottom:3px}
.hpwrap{height:9px;background:rgba(0,0,0,.4);border-radius:3px;margin-bottom:2px;overflow:hidden}
.hpbar{height:9px;border-radius:3px;transition:width .07s}
.hpbar.right{margin-left:auto}
.stxt{font-size:10px;opacity:.5;margin-bottom:4px;font-variant-numeric:tabular-nums}
.ab-row{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:2px}
.ab-row.right{justify-content:flex-end}
.abtag{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;position:relative;overflow:hidden;display:inline-block}
.abtag .cdov{position:absolute;top:0;left:0;height:100%;background:rgba(0,0,0,.55);transition:width .07s}
.abtag .lbl{position:relative;z-index:1;white-space:nowrap}
.pbar-wrap{height:3px;background:rgba(0,0,0,.3);border-radius:2px;margin-top:2px;overflow:hidden}
.pbar{height:3px;border-radius:2px;transition:width .1s}
</style>
</head>
<body>
<div id="title">ANIME SPHERES</div>
<div id="matchup-lbl">Select your fighters</div>
<div id="arena-wrap">
  <canvas id="cv" width="400" height="400"></canvas>
  <div id="msg"></div>
  <div id="ov">
    <h2>ANIME SPHERES</h2>
    <div class="sub">AUTO BATTLE · 25 FIGHTERS · UNIQUE ABILITIES</div>
    <div class="picks-row">
      <div class="pcol">
        <div class="pcol-label">◆ Fighter 1</div>
        <input class="psearch" id="s1" placeholder="search..." oninput="filterList(0,this.value)">
        <div class="plist" id="pg1"></div>
      </div>
      <div class="pcol">
        <div class="pcol-label">Fighter 2 ◆</div>
        <input class="psearch" id="s2" placeholder="search..." oninput="filterList(1,this.value)">
        <div class="plist" id="pg2"></div>
      </div>
    </div>
    <button id="fight-btn" onclick="startGame()">FIGHT!</button>
  </div>
</div>
<div id="bottom">
  <div class="ccard" id="card1">
    <div class="cname" id="cn1">—</div>
    <div class="hpwrap"><div class="hpbar" id="hb1" style="width:100%"></div></div>
    <div class="stxt" id="hs1">—</div>
    <div class="ab-row" id="ab1"></div>
    <div class="pbar-wrap"><div class="pbar" id="pbr1" style="width:0%"></div></div>
  </div>
  <div class="ccard" id="card2" style="text-align:right">
    <div class="cname" id="cn2">—</div>
    <div class="hpwrap"><div class="hpbar right" id="hb2" style="width:100%"></div></div>
    <div class="stxt" id="hs2">—</div>
    <div class="ab-row right" id="ab2"></div>
    <div class="pbar-wrap"><div class="pbar right" id="pbr2" style="width:0%;margin-left:auto"></div></div>
  </div>
</div>

<script>
const W=400,H=400;
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');

const MELEE=75, MID=160, FAR=9999;
function dst(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);}
function inR(s,e,r){return dst(s,e)<r+s.rad+e.rad;}
function addVfx(v){vfx.push(v);}
function spawnPts(x,y,col,n,spd=3){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=.5+Math.random()*spd;
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-.7,life:14+Math.random()*16,col,sz:1.2+Math.random()*2.5});}
}
function flashMsg(t){const el=document.getElementById('msg');el.textContent=t;el.style.opacity=1;setTimeout(()=>el.style.opacity=0,650);}
function dmg(s,v,col){
  const r=Math.round(v);if(r<=0)return;
  if(s.infinityActive){s.infinityActive=false;spawnPts(s.x,s.y,'#4fa8d8',8);return;}
  if(s.spBlock){s.spBlock=false;addVfx({type:'ring',x:s.x,y:s.y,life:14,maxLife:14,col:'#ffd700',r:s.rad+8});return;}
  const red=Math.round(r*(1-(s.d4c||0)));
  s.hp=Math.max(0,s.hp-red);s.hfl=7;
  s.dnums.push({x:s.x+(Math.random()-.5)*22,y:s.y-s.rad-4,v:red,life:32,a:1});
}

// ══════════════════════════════════════════════════════════════════════════════
// CHARACTER DEFINITIONS
// attack(s,e) = main attack, fires repeatedly on cooldown, does NOT freeze orb
// passive(s,e) = builds charge, triggers effect when full
// passiveMax = how full the bar needs to be
// sCd = cooldown between attacks (frames)
// pCd = how many frames between passive ticks (lower = faster charge)
// ══════════════════════════════════════════════════════════════════════════════
const CHARS=[

{id:'naruto',label:'Naruto',sym:'N',color:'#e8541a',out:'#7a2800',
 maxHp:1200,spd:3.2,rad:22,
 aName:'Rasengan',aCol:'#4fa8d8',aTxt:'#001a2e',aCd:280,aRange:MELEE+30,
 pName:'Shadow Clone',pCol:'#f4a460',pTxt:'#3d1400',pMax:100,
 attack(s,e){
   if(!inR(s,e,MELEE+30))return false;
   flashMsg('RASENGAN!!');
   const ox=s.x,oy=s.y,tx=e.x,ty=e.y;
   addVfx({type:'spiral',ox,oy,tx,ty,life:34,maxLife:34,col:'#4fa8d8'});
   let t=0;const iv=setInterval(()=>{t++;const p=t/28;
     spawnPts(ox+(tx-ox)*p,oy+(ty-oy)*p,'#4fa8d8',4);
     if(t>=28){clearInterval(iv);dmg(e,300,'#4fa8d8');spawnPts(e.x,e.y,'#4fa8d8',18);}
   },16);return true;
 },
 passive(s,e){// spawn clone that has 10% of s hp and deals 10% damage
   const cl={x:s.x+(Math.random()-.5)*60,y:s.y+(Math.random()-.5)*60,
     vx:(Math.random()-.5)*1.5,vy:(Math.random()-.5)*1.5,r:12,
     life:300,col:s.color,out:s.out,owner:s,
     hp:s.maxHp*.10,maxHp:s.maxHp*.10,dmgMul:.10};
   clones.push(cl);spawnPts(s.x,s.y,s.color,6);
 }
},

{id:'sasuke',label:'Sasuke',sym:'S',color:'#1a1a4a',out:'#c0392b',
 maxHp:1000,spd:3.8,rad:20,
 aName:'Chidori',aCol:'#7ecef4',aTxt:'#001a2e',aCd:260,aRange:MELEE+20,
 pName:'Sharingan',pCol:'#c0392b',pTxt:'#fff',pMax:80,
 attack(s,e){
   if(!inR(s,e,MELEE+20))return false;
   flashMsg('CHIDORI!!');
   const ox=s.x,oy=s.y,dx=e.x-s.x,dy=e.y-s.y,d=dst(s,e)||1;
   addVfx({type:'lightning',x:ox,y:oy,tx:e.x,ty:e.y,life:18,maxLife:18,col:'#7ecef4'});
   let t=0;const iv=setInterval(()=>{t++;s.x=ox+dx/d*t*6;s.y=oy+dy/d*t*6;
     spawnPts(s.x,s.y,'#7ecef4',4);
     if(t>=8||dst(s,e)<s.rad+e.rad){clearInterval(iv);
       dmg(e,340,s.color);s.vx=-dx/d*5;s.vy=-dy/d*5;spawnPts(e.x,e.y,'#7ecef4',16);}
   },16);return true;
 },
 passive(s,e){// Sharingan: perfect dodge + brief counter
   s.dodging=20;
   addVfx({type:'ring',x:s.x,y:s.y,life:18,maxLife:18,col:'#c0392b',r:s.rad+10});
   // counter slash right after dodge
   setTimeout(()=>{if(inR(s,e,MELEE+40)){dmg(e,80,s.color);addVfx({type:'slashx',x:e.x,y:e.y,life:12,maxLife:12,col:'#c0392b'});}},300);
 }
},

{id:'goku',label:'Goku',sym:'G',color:'#d97c2b',out:'#1a3a6e',
 maxHp:1600,spd:2.8,rad:26,
 aName:'Kamehameha',aCol:'#1a3a6e',aTxt:'#7ecef4',aCd:360,aRange:FAR,
 pName:'Zenkai Boost',pCol:'#1a3a6e',pTxt:'#7ecef4',pMax:100,
 attack(s,e){
   flashMsg('KAMEHAMEHA!!');
   const dx=e.x-s.x,dy=e.y-s.y,d=dst(s,e)||1;
   addVfx({type:'beam',x:s.x,y:s.y,tx:s.x+dx/d*W,ty:s.y+dy/d*H,life:55,maxLife:55,col:'#1a3a6e',bw:24});
   // beam travels as projectile
   projs.push({x:s.x,y:s.y,vx:dx/d*9,vy:dy/d*9,rad:14,dmg:280,col:'#7ecef4',life:60,owner:s});
   spawnPts(s.x,s.y,'#1a3a6e',8);return true;
 },
 passive(s,e){// Zenkai: heal burst when low
   const heal=Math.round(s.maxHp*.18);
   s.hp=Math.min(s.maxHp,s.hp+heal);
   addVfx({type:'ring',x:s.x,y:s.y,life:22,maxLife:22,col:'#d97c2b',r:s.rad+14});
   spawnPts(s.x,s.y,'#d97c2b',10);
 }
},

{id:'luffy',label:'Luffy',sym:'L',color:'#c0392b',out:'#6b2516',
 maxHp:1400,spd:3.0,rad:24,
 aName:'Gum Gum Pistol',aCol:'#6b2516',aTxt:'#ffc',aCd:220,aRange:MID,
 pName:'Gear 4th',pCol:'#1a1a4a',pTxt:'#ffc',pMax:100,
 attack(s,e){
   if(!inR(s,e,MID))return false;
   // stretchy arm punch — projectile with trail
   const dx=e.x-s.x,dy=e.y-s.y,d=dst(s,e)||1;
   projs.push({x:s.x,y:s.y,vx:dx/d*10,vy:dy/d*10,rad:10,dmg:120,col:'#c0392b',life:35,owner:s,type:'punch_proj'});
   spawnPts(s.x,s.y,s.color,4);return true;
 },
 passive(s,e){// Gear 4th: grow + speed surge + collision boost
   s.gearMode=350;s.rad=Math.round(s.baseRad*1.45);s.atk=2.2;
   addVfx({type:'burst',x:s.x,y:s.y,life:28,maxLife:28,col:s.color,br:s.rad+14});
   for(let i=0;i<16;i++){const a=(i/16)*Math.PI*2;parts.push({x:s.x,y:s.y,vx:Math.cos(a)*8,vy:Math.sin(a)*8-1,life:28,col:'#c0392b',sz:5});}
   setTimeout(()=>{s.rad=s.baseRad;s.gearMode=0;s.atk=1;},5500);
 }
},

{id:'ichigo',label:'Ichigo',sym:'I',color:'#1a1a1a',out:'#888',
 maxHp:1300,spd:3.5,rad:21,
 aName:'Getsuga Tensho',aCol:'#333',aTxt:'#ccc',aCd:240,aRange:MID,
 pName:'Bankai',pCol:'#333',pTxt:'#ccc',pMax:100,
 attack(s,e){
   if(!inR(s,e,MID))return false;
   const base=Math.atan2(e.y-s.y,e.x-s.x);
   // staggered crescent slashes
   [[0,210,0],[-.28,160,80],[.28,160,160]].forEach(([off,dmg2,delay])=>{
     setTimeout(()=>{
       const ang=base+off;
       projs.push({x:s.x,y:s.y,vx:Math.cos(ang)*7,vy:Math.sin(ang)*7,rad:12,dmg:dmg2,col:'#555',life:110,owner:s,type:'cres',rot:ang,off});
     },delay);
   });return true;
 },
 passive(s,e){// Bankai: permanent atk boost + dark aura
   s.atk=Math.min(3,(s.atk||1)+0.8);
   addVfx({type:'burst',x:s.x,y:s.y,life:30,maxLife:30,col:'#333',br:s.rad+12});
   spawnPts(s.x,s.y,'#555',12);
 }
},

{id:'vegeta',label:'Vegeta',sym:'V',color:'#2c3e7e',out:'#fff',
 maxHp:1100,spd:3.6,rad:21,
 aName:'Final Flash',aCol:'#fffde7',aTxt:'#1a2340',aCd:360,aRange:FAR,
 pName:'Super Saiyan',pCol:'#f5d020',pTxt:'#1a2340',pMax:100,
 attack(s,e){
   flashMsg('FINAL FLASH!!');
   addVfx({type:'charge',owner:s,life:26,maxLife:26,col:'#fffde7'});
   setTimeout(()=>{
     const dx=e.x-s.x,dy=e.y-s.y,d=dst(s,e)||1;
     addVfx({type:'beam',x:s.x,y:s.y,tx:s.x+dx/d*500,ty:s.y+dy/d*500,life:50,maxLife:50,col:'#fffde7',bw:30});
     projs.push({x:s.x,y:s.y,vx:dx/d*10,vy:dy/d*10,rad:16,dmg:400,col:'#fffde7',life:55,owner:s});
   },420);return true;
 },
 passive(s,e){// Super Saiyan: speed+atk buff + golden aura
   s.atk=Math.min(3,(s.atk||1)+0.6);s.spd=Math.min(5,CHARS[s.cidx].spd+0.6);
   addVfx({type:'burst',x:s.x,y:s.y,life:30,maxLife:30,col:'#f5d020',br:s.rad+16});
   spawnPts(s.x,s.y,'#f5d020',14);
 }
},

{id:'gojo',label:'Gojo',sym:'Go',color:'#f0f0f0',out:'#4fa8d8',
 maxHp:1500,spd:3.3,rad:23,
 aName:'Hollow Purple',aCol:'#7c5cbf',aTxt:'#fff',aCd:320,aRange:FAR,
 pName:'Infinity',pCol:'#4fa8d8',pTxt:'#fff',pMax:100,
 attack(s,e){
   flashMsg('HOLLOW PURPLE!!');
   // convergence then fire
   const ox=s.x,oy=s.y;
   addVfx({type:'hollow_purple',ox,oy,tx:e.x,ty:e.y,life:44,maxLife:44});
   let t=0;const iv=setInterval(()=>{t++;const p=t/36;
     spawnPts(ox+(e.x-ox)*p,oy+(e.y-oy)*p,'#4fa8d8',2);
     spawnPts(ox+(e.x-ox)*p,oy+(e.y-oy)*p,'#7c5cbf',2);
     if(t>=36){clearInterval(iv);dmg(e,380,'#7c5cbf');spawnPts(e.x,e.y,'#7c5cbf',22);spawnPts(e.x,e.y,'#4fa8d8',14);}
   },16);return true;
 },
 passive(s,e){// Infinity: absorb next hit completely
   s.infinityActive=true;
   addVfx({type:'ring',x:s.x,y:s.y,life:25,maxLife:25,col:'#4fa8d8',r:s.rad+12});
   spawnPts(s.x,s.y,'#4fa8d8',10);
 }
},

{id:'sukuna',label:'Sukuna',sym:'Su',color:'#8b0a3d',out:'#f5c6d0',
 maxHp:1800,spd:3.0,rad:25,
 aName:'Dismantle',aCol:'#8b0a3d',aTxt:'#f5c6d0',aCd:200,aRange:MELEE+10,
 pName:'Malevolent Shrine',pCol:'#f5c6d0',pTxt:'#4a0020',pMax:80,
 attack(s,e){
   if(!inR(s,e,MELEE+10))return false;
   // 4 staggered slashes
   for(let i=0;i<4;i++){
     setTimeout(()=>{
       if(!inR(s,e,MELEE+30))return;
       addVfx({type:'slashx',x:e.x+(Math.random()-.5)*26,y:e.y+(Math.random()-.5)*26,life:12,maxLife:12,col:'#f5c6d0'});
       dmg(e,85,s.color);
     },i*75);
   }return true;
 },
 passive(s,e){// Malevolent Shrine aura: AoE curse damage to all nearby
   addVfx({type:'ring',x:s.x,y:s.y,life:30,maxLife:30,col:'#8b0a3d',r:s.rad+30});
   // damage anything within shrine radius
   if(dst(s,e)<s.rad+e.rad+60){dmg(e,120,s.color);}
   spawnPts(s.x,s.y,'#f5c6d0',8);
 }
},

{id:'kakashi',label:'Kakashi',sym:'Ka',color:'#6e7a8a',out:'#d0d8e4',
 maxHp:1100,spd:3.7,rad:20,
 aName:'Raikiri',aCol:'#7ecef4',aTxt:'#001a2e',aCd:270,aRange:MELEE+20,
 pName:'Kamui',pCol:'#c0392b',pTxt:'#fff',pMax:80,
 attack(s,e){
   if(!inR(s,e,MELEE+20))return false;
   flashMsg('RAIKIRI!!');
   const ox=s.x,oy=s.y,dx=e.x-s.x,dy=e.y-s.y,d=dst(s,e)||1;
   addVfx({type:'lightning',x:ox,y:oy,tx:e.x,ty:e.y,life:16,maxLife:16,col:'#7ecef4'});
   let t=0;const iv=setInterval(()=>{t++;s.x=ox+dx/d*t*6.5;s.y=oy+dy/d*t*6.5;
     spawnPts(s.x,s.y,'#7ecef4',4);
     if(t>=8||dst(s,e)<s.rad+e.rad){clearInterval(iv);
       dmg(e,310,s.color);s.vx=-dx/d*5;s.vy=-dy/d*5;spawnPts(e.x,e.y,'#7ecef4',14);}
   },16);return true;
 },
 passive(s,e){// Kamui: teleport enemy away (dimensional banish)
   const nx=Math.random()*300+50,ny=Math.random()*300+50;
   addVfx({type:'ring',x:e.x,y:e.y,life:22,maxLife:22,col:'#c0392b',r:e.rad+14});
   e.x=nx;e.y=ny;e.vx=(Math.random()-.5)*2;e.vy=(Math.random()-.5)*2;
   spawnPts(e.x,e.y,'#c0392b',12);
 }
},

{id:'gon',label:'Gon',sym:'Gn',color:'#2e8b57',out:'#f5f5dc',
 maxHp:1250,spd:3.4,rad:21,
 aName:'Rock',aCol:'#1a4a2e',aTxt:'#f5f5dc',aCd:260,aRange:MELEE,
 pName:'Adult Gon',pCol:'#c8a000',pTxt:'#1a1a00',pMax:100,
 attack(s,e){
   if(!inR(s,e,MELEE))return false;
   // huge lunge punch
   const dx=e.x-s.x,dy=e.y-s.y,d=dst(s,e)||1;
   s.vx=dx/d*8;s.vy=dy/d*8;
   addVfx({type:'burst',x:s.x,y:s.y,life:20,maxLife:20,col:'#2e8b57',br:s.rad+8});
   setTimeout(()=>{if(inR(s,e,MELEE+20)){dmg(e,300,s.color);spawnPts(e.x,e.y,'#2e8b57',16);}},180);
   return true;
 },
 passive(s,e){// Adult Gon: massive power surge (permanent atk boost)
   s.atk=Math.min(4,(s.atk||1)+1.2);s.rad=Math.min(s.baseRad+6,s.baseRad+6);
   addVfx({type:'burst',x:s.x,y:s.y,life:35,maxLife:35,col:'#c8a000',br:s.rad+20});
   spawnPts(s.x,s.y,'#c8a000',18);flashMsg('ADULT GON!!');
 }
},

// ─── ENGINE ──────────────────────────────────────────────────────────────────
let p1idx=0,p2idx=1,state=null,running=false,raf=null;
let parts=[],projs=[],clones=[],vfx=[];

function hexRgb(h,a){try{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}catch(e){return'transparent';}}

// build list items
function buildLists(){
  [0,1].forEach(pi=>{
    const el=document.getElementById('pg'+(pi+1));el.innerHTML='';
    CHARS.forEach((c,i)=>{
      const b=document.createElement('button');
      b.className='pitem'+((pi===0?p1idx:p2idx)===i?' sel':'');
      b.style.background=hexRgb(c.color,.25);b.style.borderColor=c.color;b.style.color=c.out==='#fff'?'#fff':lightText(c.out);
      b.textContent=c.label;b.dataset.idx=i;
      b.onclick=()=>{if(pi===0)p1idx=i;else p2idx=i;document.querySelectorAll('#pg'+(pi+1)+' .pitem').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');};
      el.appendChild(b);
    });
  });
}
function filterList(pi,q){
  const el=document.getElementById('pg'+(pi+1));
  el.querySelectorAll('.pitem').forEach(b=>{
    b.style.display=b.textContent.toLowerCase().includes(q.toLowerCase())?'':'none';
  });
}
function lightText(h){try{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return(r*.299+g*.587+b*.114)>90?h:'#fff';}catch(e){return'#fff';}}
buildLists();

function mkSphere(def,x,y,isP2,cidx){
  return{x,y,vx:(isP2?-1:1)*(def.spd*.5+Math.random()*.7),vy:(Math.random()-.5)*1.5,
    rad:def.rad,baseRad:def.rad,color:def.color,out:def.out,sym:def.sym,
    hp:def.maxHp,maxHp:def.maxHp,spd:def.spd,atk:1,
    cidx,isP2,aCd:60+Math.random()*60,pCd:0,pCharge:0,
    dodging:0,frozen:false,gearMode:0,born:Date.now(),
    hfl:0,dnums:[],bbonus:0,ang:0,
    infinityActive:false,spBlock:false,berserk:false,
    loveTrainTurns:0,loveTrain:false,d4c:0
  };
}

function startGame(){
  if(p1idx===p2idx)p2idx=(p1idx+1)%CHARS.length;
  const d1=CHARS[p1idx],d2=CHARS[p2idx];
  document.getElementById('matchup-lbl').textContent=d1.label+' VS '+d2.label;
  document.getElementById('matchup-lbl').style.color=d1.color;
  parts=[];projs=[];clones=[];vfx=[];
  const s1=mkSphere(d1,80,200,false,p1idx);
  const s2=mkSphere(d2,320,200,true,p2idx);
  state={s1,s2};buildBottomUI(s1,d1,s2,d2);
  document.getElementById('ov').style.display='none';
  running=true;if(raf)cancelAnimationFrame(raf);loop();
}

function buildBottomUI(s1,d1,s2,d2){
  ['1','2'].forEach(n=>{
    const s=n==='1'?s1:s2,d=n==='1'?d1:d2,right=n==='2';
    const card=document.getElementById('card'+n);
    card.style.borderTopColor=d.color;card.style.background=hexRgb(d.color,.07);
    document.getElementById('cn'+n).textContent=d.label;
    document.getElementById('cn'+n).style.color=d.color;
    document.getElementById('hb'+n).style.background=d.color;

    const ab=document.getElementById('ab'+n);ab.innerHTML='';
    // attack tag with cooldown overlay
    const atag=document.createElement('span');atag.className='abtag';atag.id='atag'+n;
    atag.style.background=d.aCol||d.color;atag.style.color=d.aTxt||'#fff';
    const acd=document.createElement('div');acd.className='cdov';acd.id='acd'+n;
    const albl=document.createElement('span');albl.className='lbl';albl.textContent=d.aName;
    atag.appendChild(acd);atag.appendChild(albl);ab.appendChild(atag);
    // passive tag
    const ptag=document.createElement('span');ptag.className='abtag';
    ptag.style.background=d.pCol||d.color;ptag.style.color=d.pTxt||'#fff';
    const pcd=document.createElement('div');pcd.className='cdov';pcd.id='pcd'+n;
    const plbl=document.createElement('span');plbl.className='lbl';plbl.textContent='[P] '+d.pName;
    ptag.appendChild(pcd);ptag.appendChild(plbl);ab.appendChild(ptag);

    document.getElementById('pbr'+n).style.background=d.pCol||d.color;
  });
}

function loop(){if(!running)return;update();draw();raf=requestAnimationFrame(loop);}

function update(){
  const{s1,s2}=state;
  updSphere(s1,s2);updSphere(s2,s1);checkColl(s1,s2);
  updProjs(s1,s2);updClones(s1,s2);
  parts=parts.filter(p=>{p.life--;p.x+=p.vx;p.y+=p.vy;p.vy+=.12;
    if(p.heal&&p.owner)p.owner.hp=Math.min(p.owner.maxHp,p.owner.hp+.35);
    return p.life>0;});
  vfx=vfx.filter(v=>{v.life--;return v.life>0;});
  updUI(s1,s2);
  if(s1.hp<=0||s2.hp<=0)endGame(s1,s2);
}

function updSphere(s,e){
  s.ang+=.032;
  // always keep moving unless dodging or frozen
  if(s.dodging>0){s.dodging--;s.x+=s.vx*.12;s.y+=s.vy*.12;bnc(s);
    s.dnums=s.dnums.filter(d=>{d.life--;d.y-=.9;d.a=d.life/32;return d.life>0;});if(s.hfl>0)s.hfl--;return;}
  if(s.frozen)return;
  if(s.gearMode>0)s.gearMode--;
  if(s.loveTrainTurns>0)s.loveTrainTurns--;else s.loveTrain=false;

  const sp=s.gearMode>0?s.spd*1.7:s.spd;
  const dx=e.x-s.x,dy=e.y-s.y,d=dst(s,e)||1;
  s.vx+=dx/d*.07;s.vy+=dy/d*.07;
  const m=Math.sqrt(s.vx*s.vx+s.vy*s.vy)||1;
  if(m>sp){s.vx=s.vx/m*sp;s.vy=s.vy/m*sp;}
  s.x+=s.vx;s.y+=s.vy;bnc(s);

  // attack cooldown
  if(s.aCd>0)s.aCd--;
  else{
    const fired=CHARS[s.cidx].attack(s,e);
    s.aCd=fired===false?20:CHARS[s.cidx].aCd+(Math.random()*30|0);
  }

  // passive charge
  const def=CHARS[s.cidx];
  const chargeRate=s.hp<s.maxHp*.4?0.55:0.28;// charge faster when hurt
  s.pCharge=Math.min(def.pMax||100,s.pCharge+chargeRate);
  if(s.pCharge>=(def.pMax||100)){
    s.pCharge=0;def.passive(s,e);
  }

  s.dnums=s.dnums.filter(d=>{d.life--;d.y-=.9;d.a=d.life/32;return d.life>0;});
  if(s.hfl>0)s.hfl--;
}

function bnc(s){
  const r=s.rad,isL=CHARS[s.cidx].id==='luffy';
  if(s.x-r<0){s.x=r;s.vx=Math.abs(s.vx);if(isL)s.bbonus++;}
  if(s.x+r>W){s.x=W-r;s.vx=-Math.abs(s.vx);if(isL)s.bbonus++;}
  if(s.y-r<0){s.y=r;s.vy=Math.abs(s.vy);if(isL)s.bbonus++;}
  if(s.y+r>H){s.y=H-r;s.vy=-Math.abs(s.vy);if(isL)s.bbonus++;}
}

function checkColl(s1,s2){
  const dx=s2.x-s1.x,dy=s2.y-s1.y,d=dst(s1,s2)||1;
  const mn=s1.rad+s2.rad;
  if(d<mn){
    const nx=dx/d,ny=dy/d,ov=(mn-d)/2;
    s1.x-=nx*ov;s1.y-=ny*ov;s2.x+=nx*ov;s2.y+=ny*ov;
    const rv=(s1.vx-s2.vx)*nx+(s1.vy-s2.vy)*ny;
    if(rv>0){s1.vx-=rv*nx*1.1;s1.vy-=rv*ny*1.1;s2.vx+=rv*nx*1.1;s2.vy+=rv*ny*1.1;}
    const base=4+Math.abs(rv)*1.6;
    let d1=(base*(s2.atk||1)+(s2.bbonus||0)*10)*(s2.gearMode>0?1.6:1);
    let d2=(base*(s1.atk||1)+(s1.bbonus||0)*10)*(s1.gearMode>0?1.6:1);
    if(s1.loveTrain){dmg(s2,d2,s1.color);d2=0;}
    if(s2.loveTrain){dmg(s1,d1,s2.color);d1=0;}
    dmg(s1,d2,s2.color);dmg(s2,d1,s1.color);
    s1.bbonus=0;s2.bbonus=0;
    spawnPts((s1.x+s2.x)/2,(s1.y+s2.y)/2,'#fff',8);
  }
}

function updProjs(s1,s2){
  projs=projs.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.type==='spin_ball'||p.type==='nail')p.rot=(p.rot||0)+.38;
    const tgt=p.owner===s1?s2:s1;
    if((p.x-tgt.x)**2+(p.y-tgt.y)**2<(tgt.rad+p.rad)**2){
      if(p.type==='bomb_proj'){
        addVfx({type:'burst',x:tgt.x,y:tgt.y,life:22,maxLife:22,col:p.col,br:tgt.rad+20});
        dmg(tgt,280,p.col);
      } else{dmg(tgt,p.dmg,p.col);}
      spawnPts(p.x,p.y,p.col,7);return false;
    }
    return p.life>0&&p.x>-30&&p.x<W+30&&p.y>-30&&p.y<H+30;
  });
}

function updClones(s1,s2){
  // clones chase the enemy of their owner
  clones=clones.filter(cl=>{
    cl.life--;
    const enemy=cl.owner===s1?s2:s1;
    const dx=enemy.x-cl.x,dy=enemy.y-cl.y,d=Math.sqrt(dx*dx+dy*dy)||1;
    cl.vx+=dx/d*.07;cl.vy+=dy/d*.07;
    const m=Math.sqrt(cl.vx*cl.vx+cl.vy*cl.vy)||1;
    if(m>3.2){cl.vx=cl.vx/m*3.2;cl.vy=cl.vy/m*3.2;}
    cl.x+=cl.vx;cl.y+=cl.vy;
    cl.x=Math.max(cl.r,Math.min(W-cl.r,cl.x));cl.y=Math.max(cl.r,Math.min(H-cl.r,cl.y));
    if((cl.x-enemy.x)**2+(cl.y-enemy.y)**2<(cl.r+enemy.rad)**2){
      // clone has 10% of owner maxhp and deals 10% damage
      const cloneDmg=Math.round((cl.dmgMul||.1)*CHARS[cl.owner.cidx].maxHp*.05);
      dmg(enemy,Math.max(40,cloneDmg),cl.col);
      spawnPts(cl.x,cl.y,'#f4a460',6);return false;
    }
    return cl.life>0;
  });
}

// ─── DRAW ────────────────────────────────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#111122';ctx.fillRect(0,0,W,H);
  for(let i=0;i<W;i+=40)for(let j=0;j<H;j+=40){ctx.fillStyle='rgba(255,255,255,.018)';ctx.fillRect(i,j,20,20);ctx.fillRect(i+20,j+20,20,20);}
  vfx.forEach(v=>drawVfx(v));ctx.globalAlpha=1;
  clones.forEach(cl=>{
    ctx.save();ctx.globalAlpha=.52;ctx.fillStyle=cl.col;ctx.strokeStyle=cl.out||'#888';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(cl.x,cl.y,cl.r,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle='#fff7';ctx.beginPath();ctx.arc(cl.x-cl.r*.25,cl.y-cl.r*.25,cl.r*.2,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
  projs.forEach(p=>drawProj(p));
  parts.forEach(p=>{ctx.globalAlpha=p.life/30;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
  drawSphere(state.s1);drawSphere(state.s2);
  [state.s1,state.s2].forEach(s=>{
    s.dnums.forEach(d=>{
      ctx.globalAlpha=d.a;
      ctx.strokeStyle='#000';ctx.lineWidth=3;
      ctx.fillStyle=d.v>150?'#FAC775':'#ff9090';
      ctx.font=`bold ${d.v>150?15:12}px Nunito`;ctx.textAlign='center';ctx.textBaseline='top';
      ctx.strokeText('-'+d.v,d.x,d.y);ctx.fillText('-'+d.v,d.x,d.y);
    });ctx.globalAlpha=1;
  });
}

function drawVfx(v){
  const pct=1-v.life/v.maxLife;ctx.save();
  if(v.type==='beam'){
    const dx=v.tx-v.x,dy=v.ty-v.y,d=Math.sqrt(dx*dx+dy*dy)||1;
    const len=d*Math.min(1,pct*2.4);
    ctx.translate(v.x,v.y);ctx.rotate(Math.atan2(dy,dx));
    const bw=v.bw||18;ctx.globalAlpha=Math.max(0,1-pct*1.05);
    ctx.fillStyle=v.col+'99';ctx.fillRect(0,-bw*.8,len,bw*1.6);
    ctx.fillStyle=v.col;ctx.fillRect(0,-bw/2,len,bw);
    ctx.fillStyle='#fff';ctx.fillRect(0,-bw*.1,len,bw*.2);
  }else if(v.type==='lightning'){
    ctx.globalAlpha=.9-pct*.5;
    for(let pass=0;pass<2;pass++){
      ctx.strokeStyle=pass===0?'#fff':v.col||'#7ecef4';ctx.lineWidth=pass===0?1:2.5;
      ctx.beginPath();ctx.moveTo(v.x,v.y);
      for(let i=1;i<=7;i++){const t=i/7;ctx.lineTo(v.x+(v.tx-v.x)*t+(Math.random()-.5)*20,v.y+(v.ty-v.y)*t+(Math.random()-.5)*20);}
      ctx.lineTo(v.tx,v.ty);ctx.stroke();
    }
  }else if(v.type==='spiral'){
    const p=1-v.life/v.maxLife,cx=v.ox+(v.tx-v.ox)*p,cy=v.oy+(v.ty-v.oy)*p;
    for(let ring=0;ring<3;ring++){ctx.globalAlpha=(.8-ring*.2)*(1-pct*.3);ctx.strokeStyle=v.col;ctx.lineWidth=3.5-ring;ctx.beginPath();ctx.arc(cx,cy,11+ring*9,0,Math.PI*2);ctx.stroke();}
    ctx.fillStyle='#fff';ctx.globalAlpha=(1-pct)*.9;ctx.beginPath();ctx.arc(cx,cy,8,0,Math.PI*2);ctx.fill();
  }else if(v.type==='burst'){
    const r=(v.br||20)+pct*60;ctx.globalAlpha=(1-pct)*.82;ctx.strokeStyle=v.col;ctx.lineWidth=4;ctx.beginPath();ctx.arc(v.x,v.y,r,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='#fff8';ctx.lineWidth=1.5;ctx.globalAlpha=(1-pct)*.28;ctx.beginPath();ctx.arc(v.x,v.y,r*.65,0,Math.PI*2);ctx.stroke();
  }else if(v.type==='charge'){
    const o=v.owner;
    for(let i=0;i<10;i++){const a=(i/10)*Math.PI*2+pct*14,r=o.rad+8+pct*22;ctx.globalAlpha=(1-pct)*.85;ctx.fillStyle=v.col;ctx.beginPath();ctx.arc(o.x+Math.cos(a)*r,o.y+Math.sin(a)*r,4.5,0,Math.PI*2);ctx.fill();}
  }else if(v.type==='ring'){
    ctx.globalAlpha=(1-pct)*.75;ctx.strokeStyle=v.col;ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(v.x,v.y,(v.r||24)+pct*16,0,Math.PI*2);ctx.stroke();
  }else if(v.type==='slashx'){
    ctx.globalAlpha=1-pct;ctx.strokeStyle=v.col;ctx.lineWidth=3.5;
    const s=22+pct*14;
    ctx.beginPath();ctx.moveTo(v.x-s,v.y-s);ctx.lineTo(v.x+s,v.y+s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(v.x+s,v.y-s);ctx.lineTo(v.x-s,v.y+s);ctx.stroke();
  }else if(v.type==='punch'){
    ctx.globalAlpha=1-pct;ctx.strokeStyle=v.col;ctx.lineWidth=4;ctx.beginPath();ctx.arc(v.x,v.y,9+pct*12,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='#fff';ctx.globalAlpha=(1-pct)*.55;ctx.beginPath();ctx.arc(v.x,v.y,4,0,Math.PI*2);ctx.fill();
  }else if(v.type==='hollow_purple'){
    const p=1-v.life/v.maxLife,cx=v.ox+(v.tx-v.ox)*p,cy=v.oy+(v.ty-v.oy)*p;
    ctx.globalAlpha=.9-pct*.5;
    ctx.fillStyle='#4fa8d8';ctx.beginPath();ctx.arc(cx-9,cy,12+pct*4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#7c5cbf';ctx.beginPath();ctx.arc(cx+9,cy,12+pct*4,0,Math.PI*2);ctx.fill();
    if(pct>.65){ctx.fillStyle='#fff';ctx.globalAlpha=(pct-.65)/.35*.9;ctx.beginPath();ctx.arc(cx,cy,20+pct*20,0,Math.PI*2);ctx.fill();}
  }else if(v.type==='sword_arc'){
    const dx=v.tx-v.x,dy=v.ty-v.y,ang=Math.atan2(dy,dx);
    ctx.globalAlpha=1-pct;ctx.strokeStyle=v.col;ctx.lineWidth=6;
    ctx.beginPath();for(let i=-5;i<=5;i++){const a=ang+i*.13,r=55+pct*25;i===-5?ctx.moveTo(v.x+Math.cos(a)*r,v.y+Math.sin(a)*r):ctx.lineTo(v.x+Math.cos(a)*r,v.y+Math.sin(a)*r);}
    ctx.stroke();ctx.strokeStyle='#fff4';ctx.lineWidth=2;ctx.stroke();
  }else if(v.type==='time_stop'){
    ctx.globalAlpha=(1-pct)*.32;ctx.fillStyle='#1a1a5a';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.globalAlpha=(1-pct)*.05;ctx.fillRect(0,0,W,H);
  }else if(v.type==='erase'){
    ctx.globalAlpha=1-pct;ctx.strokeStyle=v.col;ctx.lineWidth=3;
    for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2;ctx.beginPath();ctx.moveTo(v.x,v.y);ctx.lineTo(v.x+Math.cos(a)*22,v.y+Math.sin(a)*22);ctx.stroke();}
  }else if(v.type==='disc'){
    ctx.globalAlpha=1-pct;ctx.strokeStyle=v.col;ctx.lineWidth=3;
    ctx.beginPath();ctx.ellipse((v.x+v.tx)/2,(v.y+v.ty)/2,Math.sqrt((v.tx-v.x)**2+(v.ty-v.y)**2)/2+4,8,Math.atan2(v.ty-v.y,v.tx-v.x),0,Math.PI*2);ctx.stroke();
  }else if(v.type==='string_web'){
    ctx.globalAlpha=.65-pct*.5;ctx.strokeStyle=v.col;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(v.x,v.y);ctx.lineTo(v.tx,v.ty);ctx.stroke();
    ctx.beginPath();ctx.moveTo(v.x+(Math.random()-.5)*8,v.y+(Math.random()-.5)*8);ctx.lineTo(v.tx+(Math.random()-.5)*8,v.ty+(Math.random()-.5)*8);ctx.stroke();
  }else if(v.type==='speed_ring'){
    ctx.globalAlpha=1-pct;ctx.strokeStyle=v.col;ctx.lineWidth=2;ctx.beginPath();ctx.arc(v.x,v.y,18+pct*28,0,Math.PI*2);ctx.stroke();
  }else if(v.type==='love_train'){
    const o=v.owner;ctx.globalAlpha=.28+Math.sin(Date.now()*.01)*.1;
    ctx.strokeStyle=v.col;ctx.lineWidth=4;ctx.beginPath();ctx.arc(o.x,o.y,o.rad+7,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='#c8161e';ctx.lineWidth=1.5;ctx.globalAlpha=.18;ctx.beginPath();ctx.arc(o.x,o.y,o.rad+4,0,Math.PI*2);ctx.stroke();
  }else if(v.type==='bomb_icon'){
    const o=v.owner;
    ctx.globalAlpha=Math.abs(Math.sin(Date.now()*.025))*.9;
    ctx.fillStyle='#2a2a2a';ctx.beginPath();ctx.arc(o.x,o.y-o.rad-12,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#EF9F27';ctx.beginPath();ctx.arc(o.x,o.y-o.rad-12,5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#EF9F27';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(o.x,o.y-o.rad-4);ctx.lineTo(o.x+3,o.y-o.rad-18);ctx.stroke();
  }
  ctx.restore();ctx.globalAlpha=1;
}

function drawProj(p){
  ctx.save();
  if(p.type==='cres'){
    ctx.translate(p.x,p.y);ctx.rotate(p.rot+p.off*.5);
    ctx.strokeStyle=p.col;ctx.lineWidth=5;ctx.beginPath();ctx.arc(0,0,p.rad,.32,Math.PI-.32);ctx.stroke();
    ctx.strokeStyle='#fff4';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(0,0,p.rad,.32,Math.PI-.32);ctx.stroke();
  }else if(p.type==='flame'){
    ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.rad,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#222';ctx.globalAlpha=.4;ctx.beginPath();ctx.arc(p.x+1,p.y-1,p.rad*.55,0,Math.PI*2);ctx.fill();
  }else if(p.type==='nail'){
    ctx.translate(p.x,p.y);ctx.rotate(p.rot||0);
    ctx.fillStyle=p.col;ctx.fillRect(-p.rad,-p.rad*.22,p.rad*2,p.rad*.44);
    ctx.fillStyle='#c8e8c8';ctx.fillRect(p.rad*.5,-p.rad*.1,p.rad*.5,p.rad*.2);
  }else if(p.type==='spin_ball'||p.type==='ball'){
    ctx.translate(p.x,p.y);ctx.rotate(p.rot||0);
    ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(0,0,p.rad,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#c8c8c8';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-p.rad,0);ctx.lineTo(p.rad,0);ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,p.rad,.1,Math.PI-.1);ctx.stroke();
    ctx.fillStyle='#fff4';ctx.beginPath();ctx.arc(-p.rad*.3,-p.rad*.3,p.rad*.28,0,Math.PI*2);ctx.fill();
  }else if(p.type==='bomb_proj'){
    ctx.fillStyle='#2a2a2a';ctx.beginPath();ctx.arc(p.x,p.y,p.rad,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.rad*.5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#EF9F27';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(p.x,p.y-p.rad);ctx.lineTo(p.x+3,p.y-p.rad-8);ctx.stroke();
  }else if(p.type==='string_proj'){
    ctx.strokeStyle=p.col;ctx.lineWidth=2.5;ctx.globalAlpha=.85;
    ctx.beginPath();ctx.moveTo(p.x-p.vx*10,p.y-p.vy*10);ctx.lineTo(p.x,p.y);ctx.stroke();
    ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.rad,0,Math.PI*2);ctx.fill();
  }else if(p.type==='knife'){
    ctx.translate(p.x,p.y);ctx.rotate(Math.atan2(p.vy,p.vx));
    ctx.fillStyle=p.col;ctx.fillRect(-8,-2,16,4);
    ctx.fillStyle='#fff8';ctx.fillRect(4,-1.5,4,3);
  }else if(p.type==='punch_proj'){
    ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.rad,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.globalAlpha=.5;ctx.beginPath();ctx.arc(p.x,p.y,p.rad*.4,0,Math.PI*2);ctx.fill();
  }else{
    ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.rad,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.globalAlpha=.38;ctx.beginPath();ctx.arc(p.x,p.y,p.rad*.38,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();ctx.globalAlpha=1;
}

function drawSphere(s){
  const r=s.rad;ctx.save();ctx.translate(s.x,s.y);
  if(s.gearMode>0){
    const pulse=Math.sin(Date.now()*.015)*.5+.5;ctx.strokeStyle=s.color;ctx.lineWidth=3+pulse;
    for(let i=0;i<3;i++){ctx.globalAlpha=.18+i*.06;ctx.beginPath();ctx.arc(0,0,r+8+i*8,0,Math.PI*2);ctx.stroke();}ctx.globalAlpha=1;
  }
  if(s.dodging)ctx.globalAlpha=.38;
  ctx.fillStyle=s.hfl>0?'#fff':s.color;
  ctx.strokeStyle=s.out;ctx.lineWidth=3.5;
  ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.rotate(s.ang);ctx.fillStyle=s.out+'38';
  for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2;ctx.beginPath();ctx.arc(Math.cos(a)*r*.55,Math.sin(a)*r*.55,r*.2,0,Math.PI*2);ctx.fill();}
  ctx.rotate(-s.ang);
  ctx.fillStyle='#ffffff85';ctx.beginPath();ctx.arc(-r*.27,-r*.27,r*.21,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;ctx.fillStyle=s.out;
  const fs=s.sym.length>1?Math.round(r*.56):Math.round(r*.74);
  ctx.font=`bold ${fs}px Bangers,cursive`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(s.sym,0,1);
  ctx.restore();
  const hw=r*2.3,hh=9,hx=s.x-hw/2,hy=s.y+r+4;
  ctx.fillStyle='rgba(0,0,0,.28)';ctx.fillRect(hx,hy,hw,hh);
  const fr=Math.max(0,s.hp/s.maxHp);
  ctx.fillStyle=fr>.5?s.color:fr>.25?'#EF9F27':'#E24B4A';
  ctx.fillRect(hx,hy,hw*fr,hh);
  ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=1;ctx.strokeRect(hx,hy,hw,hh);
  ctx.strokeStyle='#000';ctx.lineWidth=2.5;ctx.fillStyle=fr>.3?'#fff':'#ffcccc';
  ctx.font='bold 11px Nunito';ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.strokeText(Math.ceil(s.hp),s.x,hy-1);ctx.fillText(Math.ceil(s.hp),s.x,hy-1);
}

function updUI(s1,s2){
  [[s1,'1'],[s2,'2']].forEach(([s,n])=>{
    const fr=Math.max(0,s.hp/s.maxHp);
    document.getElementById('hb'+n).style.width=(fr*100)+'%';
    document.getElementById('hs'+n).textContent=Math.ceil(s.hp)+' / '+s.maxHp;
    const acd=document.getElementById('acd'+n);
    if(acd)acd.style.width=(Math.max(0,s.aCd/CHARS[s.cidx].aCd)*100)+'%';
    const pcd=document.getElementById('pcd'+n);
    const def=CHARS[s.cidx];
    if(pcd)pcd.style.width=(Math.max(0,1-s.pCharge/(def.pMax||100))*100)+'%';
    const pbr=document.getElementById('pbr'+n);
    if(pbr)pbr.style.width=(Math.min(100,s.pCharge/(def.pMax||100)*100))+'%';
  });
}

function endGame(s1,s2){
  running=false;
  const w=s1.hp>s2.hp?s1:s2;const def=CHARS[w.cidx];
  const ov=document.getElementById('ov');ov.style.display='flex';
  ov.innerHTML=`
    <div style="font-family:Bangers,cursive;font-size:26px;color:${def.color};letter-spacing:3px;margin-bottom:4px">${def.label} WINS!</div>
    <div style="color:#555;font-size:11px;margin-bottom:8px">${Math.ceil(w.hp)} HP remaining</div>
    <div style="width:85%;height:12px;background:rgba(0,0,0,.3);border-radius:4px;overflow:hidden;margin-bottom:10px">
      <div style="height:100%;background:${def.color};width:${Math.round(w.hp/w.maxHp*100)}%;border-radius:4px"></div>
    </div>
    <button onclick="resetMenu()" style="font-family:Bangers,cursive;font-size:17px;letter-spacing:2px;padding:6px 26px;background:${def.color};color:${def.out};border:none;border-radius:7px;cursor:pointer">REMATCH</button>
  `;
}

function resetMenu(){
  running=false;parts=[];projs=[];clones=[];vfx=[];ctx.clearRect(0,0,W,H);
  const ov=document.getElementById('ov');ov.style.display='flex';
  ov.innerHTML=`
    <h2>ANIME SPHERES</h2>
    <div class="sub">AUTO BATTLE · 25 FIGHTERS · UNIQUE ABILITIES</div>
    <div class="picks-row">
      <div class="pcol"><div class="pcol-label">◆ Fighter 1</div><input class="psearch" id="s1" placeholder="search..." oninput="filterList(0,this.value)"><div class="plist" id="pg1"></div></div>
      <div class="pcol"><div class="pcol-label">Fighter 2 ◆</div><input class="psearch" id="s2" placeholder="search..." oninput="filterList(1,this.value)"><div class="plist" id="pg2"></div></div>
    </div>
    <button id="fight-btn" onclick="startGame()">FIGHT!</button>
  `;
  buildLists();
}
</script>
