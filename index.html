<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Anime Spheres</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d1a;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:12px;gap:8px}
#title{font-family:'Bangers',cursive;font-size:30px;letter-spacing:4px;color:#FAC775;text-shadow:2px 2px 0 #412402}
#matchup-lbl{font-family:'Bangers',cursive;font-size:20px;letter-spacing:2px;color:#555;min-height:28px}
#arena-wrap{position:relative;width:380px;height:380px;border:7px solid #333;border-radius:4px;overflow:hidden;flex-shrink:0}
canvas{display:block}
#msg{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);font-family:'Bangers',cursive;font-size:36px;color:#FAC775;text-shadow:3px 3px 0 #000;pointer-events:none;opacity:0;z-index:9;letter-spacing:3px;white-space:nowrap;transition:opacity .15s}
#ov{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,15,.88);z-index:10;padding:12px;gap:5px;overflow-y:auto}
#ov h2{font-family:'Bangers',cursive;font-size:28px;color:#FAC775;letter-spacing:3px}
#ov p{color:#888;font-size:11px;text-align:center}
.section-lbl{color:#666;font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-top:6px;align-self:flex-start;padding-left:4px}
.picks-row{display:flex;gap:12px;width:100%;justify-content:center}
.pcol{display:flex;flex-direction:column;align-items:center;gap:3px}
.pcol>span{color:#666;font-size:10px;letter-spacing:1px;text-transform:uppercase}
.pgrid{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;max-width:170px}
.pb{font-family:'Bangers',cursive;font-size:10px;padding:3px 7px;border-radius:5px;border:2px solid transparent;cursor:pointer;color:#fff;letter-spacing:1px;opacity:.8;transition:opacity .1s,border-color .1s}
.pb:hover{opacity:1}
.pb.sel{border-color:#fff!important;opacity:1}
#fight-btn{font-family:'Bangers',cursive;font-size:18px;letter-spacing:2px;padding:8px 32px;background:#E24B4A;color:#fff;border:none;border-radius:7px;cursor:pointer;margin-top:6px}
#fight-btn:hover{background:#A32D2D}
#bottom{width:380px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ccard{background:#12122a;border:1px solid #222;border-radius:9px;padding:7px 9px}
.ccard.right{text-align:right}
.cname{font-family:'Bangers',cursive;font-size:14px;letter-spacing:1px}
.hpwrap{height:7px;background:#1a1a2e;border-radius:4px;margin:3px 0}
.hpbar{height:7px;border-radius:4px;transition:width .08s}
.hpbar.right{margin-left:auto}
.stxt{font-size:10px;color:#555;margin-bottom:3px}
.abrow{display:flex;gap:3px;flex-wrap:wrap}
.abrow.right{justify-content:flex-end}
.ptag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700}
.stag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700}
.cd-wrap{position:relative;overflow:hidden;border-radius:4px;display:inline-block}
.cdover{position:absolute;left:0;top:0;height:100%;background:rgba(0,0,0,.55);pointer-events:none;transition:width .08s}
</style>
</head>
<body>
<div id="title">ANIME SPHERES</div>
<div id="matchup-lbl">Select your fighters</div>
<div id="arena-wrap">
  <canvas id="cv" width="380" height="380"></canvas>
  <div id="msg"></div>
  <div id="ov">
    <h2>ANIME SPHERES</h2>
    <p>Fully automatic battle &bull; 10x HP &bull; Animated abilities</p>
    <div class="picks-row">
      <div class="pcol"><span>Fighter 1</span><div class="pgrid" id="pg1"></div></div>
      <div class="pcol"><span>Fighter 2</span><div class="pgrid" id="pg2"></div></div>
    </div>
    <button id="fight-btn" onclick="startGame()">FIGHT!</button>
  </div>
</div>
<div id="bottom">
  <div class="ccard" id="card1">
    <div class="cname" id="cn1">—</div>
    <div class="hpwrap"><div class="hpbar" id="hb1" style="width:100%"></div></div>
    <div class="stxt" id="hs1">HP: —</div>
    <div class="abrow" id="ab1"></div>
  </div>
  <div class="ccard right" id="card2">
    <div class="cname" id="cn2">—</div>
    <div class="hpwrap"><div class="hpbar right" id="hb2" style="width:100%"></div></div>
    <div class="stxt" id="hs2">HP: —</div>
    <div class="abrow right" id="ab2"></div>
  </div>
</div>

<script>
const W=380,H=380;
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');

// ─── CHARACTER DEFINITIONS ───────────────────────────────────────────────────
const CHARS = [
  // ── NARUTO ──
  {id:'naruto',label:'Naruto',sym:'N',color:'#EF9F27',out:'#633806',
   maxHp:1200,spd:3.2,rad:22,
   pName:'Shadow Clone',pCol:'#FAC775',pTxt:'#412402',
   sName:'Rasengan',sCol:'#EF9F27',sTxt:'#412402',sCd:300,
   passive(s,e){if(Math.random()<.006)doSpawnClone(s,e);},
   special(s,e){
     flashMsg('RASENGAN!!');
     const ox=s.x,oy=s.y;
     addVfx({type:'spiral',ox,oy,tx:e.x,ty:e.y,life:38,maxLife:38,color:s.color});
     let t=0;const iv=setInterval(()=>{
       t++;const p=Math.min(1,t/30);
       spawnParts(ox+(e.x-ox)*p,oy+(e.y-oy)*p,s.color,5);
       if(t>=30){clearInterval(iv);dealDmg(e,280,s.color);spawnParts(e.x,e.y,s.color,22);}
     },16);
   }
  },
  // ── SASUKE ──
  {id:'sasuke',label:'Sasuke',sym:'S',color:'#7F77DD',out:'#26215C',
   maxHp:1000,spd:3.8,rad:20,
   pName:'Sharingan',pCol:'#AFA9EC',pTxt:'#26215C',
   sName:'Chidori',sCol:'#7F77DD',sTxt:'#CECBF6',sCd:260,
   passive(s,e){if(Math.random()<.007){s.dodging=14;addVfx({type:'dodge',x:s.x,y:s.y,life:14,maxLife:14,color:s.color});}},
   special(s,e){
     flashMsg('CHIDORI!!');
     const ox=s.x,oy=s.y,dx=e.x-s.x,dy=e.y-s.y,d=Math.sqrt(dx*dx+dy*dy)||1;
     addVfx({type:'lightning',x:ox,y:oy,tx:e.x,ty:e.y,life:20,maxLife:20,color:'#AFA9EC'});
     let t=0;const iv=setInterval(()=>{
       t++;s.x=ox+dx/d*t*5.5;s.y=oy+dy/d*t*5.5;
       spawnParts(s.x,s.y,'#AFA9EC',5);
       if(t>=9||dist2(s,e)<(s.rad+e.rad)**2){
         clearInterval(iv);dealDmg(e,320,s.color);
         s.vx=-dx/d*5;s.vy=-dy/d*5;spawnParts(e.x,e.y,'#AFA9EC',20);
       }
     },16);
   }
  },
  // ── GOKU ──
  {id:'goku',label:'Goku',sym:'G',color:'#5DCAA5',out:'#04342C',
   maxHp:1600,spd:2.8,rad:26,
   pName:'Zenkai Boost',pCol:'#9FE1CB',pTxt:'#04342C',
   sName:'Kamehameha',sCol:'#5DCAA5',sTxt:'#04342C',sCd:350,
   passive(s,e){if(s.hp<s.maxHp*.3&&Math.random()<.005){s.hp=Math.min(s.maxHp,s.hp+8);spawnParts(s.x,s.y,s.color,3);}},
   special(s,e){
     flashMsg('KAMEHAMEHA!!');
     const dx=e.x-s.x,dy=e.y-s.y,d=Math.sqrt(dx*dx+dy*dy)||1;
     addVfx({type:'beam',x:s.x,y:s.y,tx:e.x,ty:e.y,life:50,maxLife:50,color:'#5DCAA5',bw:22});
     let t=0;const iv=setInterval(()=>{
       t++;const px=s.x+dx/d*t*8,py=s.y+dy/d*t*8;
       spawnParts(px,py,'#9FE1CB',3);
       if(Math.sqrt((px-e.x)**2+(py-e.y)**2)<e.rad+14||t>22){clearInterval(iv);dealDmg(e,260,s.color);spawnParts(e.x,e.y,'#5DCAA5',22);}
     },20);
   }
  },
  // ── LUFFY ──
  {id:'luffy',label:'Luffy',sym:'L',color:'#D4537E',out:'#4B1528',
   maxHp:1400,spd:3.0,rad:24,
   pName:'Rubber Body',pCol:'#F4C0D1',pTxt:'#4B1528',
   sName:'Gear 4th',sCol:'#D4537E',sTxt:'#F4C0D1',sCd:420,
   passive(s,e){},// bbonus applied in bounce
   special(s,e){
     flashMsg('GEAR FOURTH!!');
     s.gearMode=280;s.rad=Math.round(s.baseRad*1.45);
     addVfx({type:'burst',x:s.x,y:s.y,life:28,maxLife:28,color:s.color,br:s.rad});
     for(let i=0;i<18;i++){const a=(i/18)*Math.PI*2;parts.push({x:s.x,y:s.y,vx:Math.cos(a)*8,vy:Math.sin(a)*8-1,life:30,color:'#D4537E',size:5});}
     setTimeout(()=>{if(s.alive!==false)s.rad=s.baseRad;},5000);
   }
  },
  // ── ICHIGO ──
  {id:'ichigo',label:'Ichigo',sym:'I',color:'#888780',out:'#2C2C2A',
   maxHp:1300,spd:3.5,rad:21,
   pName:'Bankai',pCol:'#D3D1C7',pTxt:'#2C2C2A',
   sName:'Getsuga',sCol:'#444441',sTxt:'#F1EFE8',sCd:240,
   passive(s,e){s.atk=1+Math.min(2.5,(Date.now()-s.born)/25000);},
   special(s,e){
     flashMsg('GETSUGA TENSHO!!');
     const base=Math.atan2(e.y-s.y,e.x-s.x);
     [[0,200],[-.32,160],[.32,120]].forEach(([off,dmg])=>{
       const ang=base+off;
       projs.push({x:s.x,y:s.y,vx:Math.cos(ang)*6.5,vy:Math.sin(ang)*6.5,rad:12,dmg,color:'#B4B2A9',life:115,owner:s,type:'cres',rot:ang,off});
     });
   }
  },
  // ── VEGETA ──
  {id:'vegeta',label:'Vegeta',sym:'V',color:'#D85A30',out:'#4A1B0C',
   maxHp:1100,spd:3.6,rad:21,
   pName:'Saiyan Pride',pCol:'#F5C4B3',pTxt:'#4A1B0C',
   sName:'Final Flash',sCol:'#D85A30',sTxt:'#F5C4B3',sCd:360,
   passive(s,e){s.atk=1+(1-s.hp/s.maxHp)*2;},
   special(s,e){
     flashMsg('FINAL FLASH!!');
     addVfx({type:'charge',owner:s,life:26,maxLife:26,color:'#D85A30'});
     setTimeout(()=>{
       const dx=e.x-s.x,dy=e.y-s.y,d=Math.sqrt(dx*dx+dy*dy)||1;
       addVfx({type:'beam',x:s.x,y:s.y,tx:e.x,ty:e.y,life:52,maxLife:52,color:'#D85A30',bw:30});
       let t=0;const iv=setInterval(()=>{
         t++;const px=s.x+dx/d*t*9,py=s.y+dy/d*t*9;
         spawnParts(px,py,'#D85A30',4);
         if(Math.sqrt((px-e.x)**2+(py-e.y)**2)<e.rad+18||t>22){clearInterval(iv);dealDmg(e,380,s.color);spawnParts(e.x,e.y,'#EF9F27',28);}
       },20);
     },450);
   }
  },

  // ── GOJO ──
  {id:'gojo',label:'Gojo',sym:'Go',color:'#85B7EB',out:'#042C53',
   maxHp:1500,spd:3.3,rad:23,
   pName:'Infinity',pCol:'#B5D4F4',pTxt:'#042C53',
   sName:'Hollow Purple',sCol:'#7F77DD',sTxt:'#EEEDFE',sCd:340,
   passive(s,e){if(Math.random()<.012){
     // Infinity: absorb incoming collision this frame by briefly reversing velocity
     s.infinityShield=(s.infinityShield||0)+1;
     addVfx({type:'shield_ring',x:s.x,y:s.y,life:18,maxLife:18,color:'#85B7EB',rad:s.rad+8});
   }},
   special(s,e){
     flashMsg('HOLLOW PURPLE!!');
     // Two orbs converge then fire
     const ox=s.x,oy=s.y;
     addVfx({type:'hollow_purple',x:ox,y:oy,tx:e.x,ty:e.y,life:45,maxLife:45});
     let t=0;const iv=setInterval(()=>{
       t++;const p=Math.min(1,t/36);
       const cx=ox+(e.x-ox)*p,cy=oy+(e.y-oy)*p;
       spawnParts(cx,cy,'#85B7EB',3);spawnParts(cx,cy,'#7F77DD',3);
       if(t>=36){clearInterval(iv);dealDmg(e,350,'#85B7EB');spawnParts(e.x,e.y,'#7F77DD',28);spawnParts(e.x,e.y,'#85B7EB',28);}
     },16);
   }
  },
  // ── SUKUNA ──
  {id:'sukuna',label:'Sukuna',sym:'Su',color:'#E24B4A',out:'#501313',
   maxHp:1800,spd:3.0,rad:25,
   pName:'Cursed Energy',pCol:'#F09595',pTxt:'#501313',
   sName:'Dismantle',sCol:'#E24B4A',sTxt:'#FCEBEB',sCd:220,
   passive(s,e){
     // Malevolent Shrine: periodically deal chip damage in radius
     if(Math.random()<.015){
       addVfx({type:'slash_x',x:s.x,y:s.y,life:12,maxLife:12,color:'#E24B4A'});
       if(dist2(s,e)<(s.rad+e.rad+40)**2)dealDmg(e,20,s.color);
     }
   },
   special(s,e){
     flashMsg('DISMANTLE!!');
     // Rapid-fire slashes
     for(let i=0;i<4;i++){
       setTimeout(()=>{
         addVfx({type:'slash_x',x:e.x+(Math.random()-0.5)*30,y:e.y+(Math.random()-0.5)*30,life:14,maxLife:14,color:'#E24B4A'});
         dealDmg(e,80,s.color);
       },i*80);
     }
   }
  },
  // ── KAKASHI ──
  {id:'kakashi',label:'Kakashi',sym:'Ka',color:'#B4B2A9',out:'#444441',
   maxHp:1100,spd:3.7,rad:20,
   pName:'Copy Ninja',pCol:'#D3D1C7',pTxt:'#444441',
   sName:'Raikiri',sCol:'#85B7EB',sTxt:'#042C53',sCd:280,
   passive(s,e){
     // Copies enemy atk occasionally
     if(Math.random()<.004)s.atk=Math.max(s.atk,(s.copyAtk||1));
     s.copyAtk=Math.max(s.copyAtk||1, 1+(1-e.hp/e.maxHp)*1.2);
   },
   special(s,e){
     flashMsg('RAIKIRI!!');
     addVfx({type:'lightning',x:s.x,y:s.y,tx:e.x,ty:e.y,life:18,maxLife:18,color:'#85B7EB'});
     const dx=e.x-s.x,dy=e.y-s.y,d=Math.sqrt(dx*dx+dy*dy)||1;
     const ox=s.x,oy=s.y;let t=0;
     const iv=setInterval(()=>{
       t++;s.x=ox+dx/d*t*6;s.y=oy+dy/d*t*6;
       spawnParts(s.x,s.y,'#85B7EB',4);
       if(t>=8||dist2(s,e)<(s.rad+e.rad)**2){
         clearInterval(iv);dealDmg(e,300,s.color);
         s.vx=-dx/d*5;s.vy=-dy/d*5;spawnParts(e.x,e.y,'#85B7EB',18);
       }
     },16);
   }
  },
  // ── GON ──
  {id:'gon',label:'Gon',sym:'Gn',color:'#97C459',out:'#173404',
   maxHp:1250,spd:3.4,rad:21,
   pName:'Nen: Enhancement',pCol:'#C0DD97',pTxt:'#173404',
   sName:'Jajanken Rock',sCol:'#639922',sTxt:'#EAF3DE',sCd:280,
   passive(s,e){
     s.atk=1+Math.min(1.8,(Date.now()-s.born)/20000);
     if(Math.random()<.005){spawnParts(s.x,s.y,'#97C459',4);}
   },
   special(s,e){
     flashMsg('ROCK!!');
     s.vx+=(e.x>s.x?1:-1)*5;s.vy+=(e.y>s.y?1:-1)*5;
     addVfx({type:'burst',x:s.x,y:s.y,life:20,maxLife:20,color:'#97C459',br:s.rad+10});
     setTimeout(()=>{if(dist2(s,e)<(s.rad+e.rad+20)**2)dealDmg(e,300,s.color);},120);
   }
  },
  // ── KILLUA ──
  {id:'killua',label:'Killua',sym:'Ki',color:'#B5D4F4',out:'#0C447C',
   maxHp:1050,spd:4.2,rad:19,
   pName:'Godspeed',pCol:'#85B7EB',pTxt:'#042C53',
   sName:'Lightning Palm',sCol:'#378ADD',sTxt:'#E6F1FB',sCd:240,
   passive(s,e){
     if(Math.random()<.01){
       s.spd=4.8+Math.random();
       addVfx({type:'lightning',x:s.x,y:s.y,tx:s.x+(Math.random()-0.5)*60,ty:s.y+(Math.random()-0.5)*60,life:8,maxLife:8,color:'#B5D4F4'});
       setTimeout(()=>s.spd=CHARS[s.cidx].spd,400);
     }
   },
   special(s,e){
     flashMsg('LIGHTNING PALM!!');
     addVfx({type:'lightning',x:s.x,y:s.y,tx:e.x,ty:e.y,life:16,maxLife:16,color:'#B5D4F4'});
     addVfx({type:'lightning',x:s.x,y:s.y,tx:e.x+20,ty:e.y-10,life:12,maxLife:12,color:'#fff'});
     dealDmg(e,260,s.color);spawnParts(e.x,e.y,'#B5D4F4',16);
   }
  },
  // ── GUTS ──
  {id:'guts',label:'Guts',sym:'Gu',color:'#444441',out:'#2C2C2A',
   maxHp:2000,spd:2.5,rad:27,
   pName:'Berserker Armor',pCol:'#B4B2A9',pTxt:'#2C2C2A',
   sName:'Dragon Slayer',sCol:'#5F5E5A',sTxt:'#F1EFE8',sCd:300,
   passive(s,e){
     // Berserker: gains atk when hurt, survives lethal once
     s.atk=1+(1-s.hp/s.maxHp)*2.5;
     if(!s.berserk && s.hp<s.maxHp*.2){
       s.berserk=true;
       addVfx({type:'burst',x:s.x,y:s.y,life:30,maxLife:30,color:'#B4B2A9',br:s.rad+15});
       spawnParts(s.x,s.y,'#E24B4A',20);
     }
   },
   special(s,e){
     flashMsg('DRAGON SLAYER!!');
     // Giant swing arc
     addVfx({type:'sword_arc',x:s.x,y:s.y,tx:e.x,ty:e.y,life:22,maxLife:22,color:'#B4B2A9'});
     dealDmg(e,380,s.color);
     s.vx=(e.x>s.x?1:-1)*3;spawnParts(e.x,e.y,'#B4B2A9',18);
   }
  },
  // ── ITACHI ──
  {id:'itachi',label:'Itachi',sym:'It',color:'#3C3489',out:'#26215C',
   maxHp:1100,spd:3.5,rad:21,
   pName:'Tsukuyomi',pCol:'#CECBF6',pTxt:'#26215C',
   sName:'Amaterasu',sCol:'#2C2C2A',sTxt:'#F1EFE8',sCd:310,
   passive(s,e){
     // Tsukuyomi: briefly stun-like (slow enemy)
     if(Math.random()<.005){
       e.spd=Math.max(.5,e.spd*.5);
       addVfx({type:'eye_glow',x:e.x,y:e.y,life:20,maxLife:20,color:'#3C3489'});
       setTimeout(()=>e.spd=CHARS[e.cidx].spd,600);
     }
   },
   special(s,e){
     flashMsg('AMATERASU!!');
     // Black flames spread
     for(let i=0;i<6;i++){
       const a=Math.random()*Math.PI*2;
       projs.push({x:s.x,y:s.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4-1,rad:8,dmg:80,color:'#111',life:90,owner:s,type:'flame'});
     }
     projs.push({x:s.x,y:s.y,vx:(e.x-s.x)/60,vy:(e.y-s.y)/60,rad:12,dmg:140,color:'#222',life:120,owner:s,type:'flame'});
   }
  },
  // ── JOTARO ──
  {id:'jotaro',label:'Jotaro',sym:'Jo',color:'#2C2C2A',out:'#0d0d1a',
   maxHp:1400,spd:3.1,rad:23,
   pName:'Star Platinum',pCol:'#888780',pTxt:'#F1EFE8',
   sName:'ORA ORA ORA',sCol:'#5F5E5A',sTxt:'#F1EFE8',sCd:280,
   passive(s,e){
     // SP: tank a hit periodically
     if(!s.spBlock)s.spBlock=0;
     s.spBlock++;
     if(s.spBlock>180){s.spBlock=0;addVfx({type:'shield_ring',x:s.x,y:s.y,life:12,maxLife:12,color:'#888780',rad:s.rad+6});}
   },
   special(s,e){
     flashMsg('ORA ORA ORA!!');
     for(let i=0;i<7;i++){
       setTimeout(()=>{
         addVfx({type:'punch',x:e.x+(Math.random()-0.5)*25,y:e.y+(Math.random()-0.5)*25,life:10,maxLife:10,color:'#888780'});
         dealDmg(e,50,s.color);
       },i*55);
     }
   }
  },
  // ── DIO ──

let p1idx=0,p2idx=1,state=null,running=false,raf=null;
let parts=[],projs=[],clones=[],vfx=[];

function dist2(a,b){return(a.x-b.x)**2+(a.y-b.y)**2;}
function addVfx(v){vfx.push(v);}

function buildPicks(){
  ['pg1','pg2'].forEach((gid,pi)=>{
    const el=document.getElementById(gid);el.innerHTML='';
    CHARS.forEach((c,i)=>{
      const b=document.createElement('button');
      b.className='pb'+((pi===0?p1idx:p2idx)===i?' sel':'');
      b.style.background=c.color;b.style.borderColor=c.color;
      b.textContent=c.sym+' '+c.label;
      b.onclick=()=>{if(pi===0)p1idx=i;else p2idx=i;el.querySelectorAll('.pb').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');};
      el.appendChild(b);
    });
  });
}
buildPicks();

function mkSphere(def,x,y,isP2,cidx){
  return{x,y,vx:(isP2?-1:1)*(def.spd*.5+Math.random()*.6),vy:(Math.random()-.5)*1.5,
    rad:def.rad,baseRad:def.rad,color:def.color,out:def.out,sym:def.sym,
    hp:def.maxHp,maxHp:def.maxHp,spd:def.spd,atk:1,
    cidx,isP2,spCd:80,spMaxCd:def.sCd,
    dodging:0,frozen:false,gearMode:0,born:Date.now(),
    hitFlash:0,dnums:[],bbonus:0,ang:0,
    infinityShield:0,berserk:false,loveTrainTurns:0,loveTrain:false
  };
}

function startGame(){
  if(p1idx===p2idx)p2idx=(p1idx+1)%CHARS.length;
  const d1=CHARS[p1idx],d2=CHARS[p2idx];
  document.getElementById('matchup-lbl').textContent=d1.label+' VS '+d2.label;
  document.getElementById('matchup-lbl').style.color=d1.color;
  parts=[];projs=[];clones=[];vfx=[];
  const s1=mkSphere(d1,75,190,false,p1idx);
  const s2=mkSphere(d2,305,190,true,p2idx);
  state={s1,s2};
  buildBottomUI(s1,d1,s2,d2);
  document.getElementById('ov').style.display='none';
  running=true;if(raf)cancelAnimationFrame(raf);loop();
}

function buildBottomUI(s1,d1,s2,d2){
  ['1','2'].forEach(n=>{
    const s=n==='1'?s1:s2,d=n==='1'?d1:d2,right=n==='2';
    document.getElementById('cn'+n).textContent=d.sym+' '+d.label;
    document.getElementById('cn'+n).style.color=d.color;
    document.getElementById('hb'+n).style.background=d.color;
    const ab=document.getElementById('ab'+n);ab.innerHTML='';
    const pt=document.createElement('span');
    pt.className='ptag';pt.style.background=d.pCol;pt.style.color=d.pTxt;
    pt.textContent='[P] '+d.pName;ab.appendChild(pt);
    const wrap=document.createElement('span');wrap.className='cd-wrap';
    const cdov=document.createElement('div');cdov.className='cdover';cdov.id='cdov'+n;
    const stag=document.createElement('span');
    stag.className='stag';stag.style.background=d.sCol;stag.style.color=d.sTxt;
    stag.id='stag'+n;stag.textContent='[S] '+d.sName;
    wrap.appendChild(cdov);wrap.appendChild(stag);ab.appendChild(wrap);
  });
}

function loop(){if(!running)return;update();draw();raf=requestAnimationFrame(loop);}

function update(){
  const{s1,s2}=state;
  updSphere(s1,s2);updSphere(s2,s1);
  checkColl(s1,s2);
  updProjs(s1,s2);updClones(s2);
  parts=parts.filter(p=>{
    p.life--;p.x+=p.vx;p.y+=p.vy;p.vy+=.12;
    if(p.heal&&p.owner){p.owner.hp=Math.min(p.owner.maxHp,p.owner.hp+.3);}
    return p.life>0;
  });
  vfx=vfx.filter(v=>{v.life--;return v.life>0;});
  updUI(s1,s2);
  if(s1.hp<=0||s2.hp<=0)endGame(s1,s2);
}

function updSphere(s,e){
  s.ang+=.032;
  if(s.dodging>0){s.dodging--;s.x+=s.vx*.15;s.y+=s.vy*.15;bnc(s);return;}
  if(s.frozen)return;
  if(s.gearMode>0)s.gearMode--;
  if(s.loveTrainTurns>0)s.loveTrainTurns--;
  else s.loveTrain=false;
  const sp=s.gearMode>0?s.spd*1.7:s.spd;
  const dx=e.x-s.x,dy=e.y-s.y,d=Math.sqrt(dx*dx+dy*dy)||1;
  s.vx+=dx/d*.07;s.vy+=dy/d*.07;
  const m=Math.sqrt(s.vx*s.vx+s.vy*s.vy)||1;
  if(m>sp){s.vx=s.vx/m*sp;s.vy=s.vy/m*sp;}
  s.x+=s.vx;s.y+=s.vy;bnc(s);
  if(s.spCd>0)s.spCd--;
  else{CHARS[s.cidx].special(s,e);s.spCd=s.spMaxCd+(Math.random()*40|0);}
  s.dnums=s.dnums.filter(dn=>{dn.life--;dn.y-=.9;dn.a=dn.life/35;return dn.life>0;});
  if(s.hitFlash>0)s.hitFlash--;
  CHARS[s.cidx].passive(s,e);
}

function bnc(s){
  const r=s.rad,isL=CHARS[s.cidx].id==='luffy';
  if(s.x-r<0){s.x=r;s.vx=Math.abs(s.vx);if(isL)s.bbonus++;}
  if(s.x+r>W){s.x=W-r;s.vx=-Math.abs(s.vx);if(isL)s.bbonus++;}
  if(s.y-r<0){s.y=r;s.vy=Math.abs(s.vy);if(isL)s.bbonus++;}
  if(s.y+r>H){s.y=H-r;s.vy=-Math.abs(s.vy);if(isL)s.bbonus++;}
}

function checkColl(s1,s2){
  const dx=s2.x-s1.x,dy=s2.y-s1.y,d=Math.sqrt(dx*dx+dy*dy)||1;
  const mn=s1.rad+s2.rad;
  if(d<mn){
    const nx=dx/d,ny=dy/d,ov=(mn-d)/2;
    s1.x-=nx*ov;s1.y-=ny*ov;s2.x+=nx*ov;s2.y+=ny*ov;
    const rv=(s1.vx-s2.vx)*nx+(s1.vy-s2.vy)*ny;
    if(rv>0){s1.vx-=rv*nx*1.1;s1.vy-=rv*ny*1.1;s2.vx+=rv*nx*1.1;s2.vy+=rv*ny*1.1;}
    const base=5+Math.abs(rv)*1.8;
    // Infinity shield for Gojo
    let d1=(base*(s2.atk||1)+(s2.bbonus||0)*10)*(s2.gearMode>0?1.6:1);
    let d2=(base*(s1.atk||1)+(s1.bbonus||0)*10)*(s1.gearMode>0?1.6:1);
    if(s1.infinityShield>0){d2*=.2;s1.infinityShield=0;}
    if(s2.infinityShield>0){d1*=.2;s2.infinityShield=0;}
    // Love Train: reflect
    if(s1.loveTrain){dealDmg(s2,d2,s1.color);d2=0;}
    if(s2.loveTrain){dealDmg(s1,d1,s2.color);d1=0;}
    // D4C shield
    if(s1.d4cShield>0){d2*=(1-s1.d4cShield/200);s1.d4cShield=Math.max(0,s1.d4cShield-20);}
    if(s2.d4cShield>0){d1*=(1-s2.d4cShield/200);s2.d4cShield=Math.max(0,s2.d4cShield-20);}
    dealDmg(s1,d2,s2.color);dealDmg(s2,d1,s1.color);
    s1.bbonus=0;s2.bbonus=0;
    spawnParts((s1.x+s2.x)/2,(s1.y+s2.y)/2,'#fff',10);
  }
}

function dealDmg(s,dmg,col){
  const v=Math.round(dmg);if(v<=0)return;
  s.hp=Math.max(0,s.hp-v);s.hitFlash=7;
  s.dnums.push({x:s.x+(Math.random()-.5)*22,y:s.y-s.rad-4,val:v,life:35,a:1});
}

function updProjs(s1,s2){
  projs=projs.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.type==='spin_ball'||p.type==='nail')p.rot=(p.rot||0)+.3;
    const tgt=p.owner===s1?s2:s1;
    if(dist2({x:p.x,y:p.y},tgt)<(tgt.rad+p.rad)**2){
      if(p.type==='bomb_proj'){
        addVfx({type:'burst',x:tgt.x,y:tgt.y,life:25,maxLife:25,color:'#D3D1C7',br:tgt.rad+18});
        dealDmg(tgt,260,p.color);
      } else {
        dealDmg(tgt,p.dmg,p.color);
      }
      spawnParts(p.x,p.y,p.color,8);return false;
    }
    return p.life>0&&p.x>-30&&p.x<W+30&&p.y>-30&&p.y<H+30;
  });
}

function updClones(enemy){
  clones=clones.filter(cl=>{
    cl.life--;
    const dx=enemy.x-cl.x,dy=enemy.y-cl.y,d=Math.sqrt(dx*dx+dy*dy)||1;
    cl.vx+=dx/d*.055;cl.vy+=dy/d*.055;
    const m=Math.sqrt(cl.vx*cl.vx+cl.vy*cl.vy)||1;
    if(m>2.9){cl.vx=cl.vx/m*2.9;cl.vy=cl.vy/m*2.9;}
    cl.x+=cl.vx;cl.y+=cl.vy;
    cl.x=Math.max(cl.r,Math.min(W-cl.r,cl.x));cl.y=Math.max(cl.r,Math.min(H-cl.r,cl.y));
    if(dist2({x:cl.x,y:cl.y},enemy)<(cl.r+enemy.rad)**2){
      dealDmg(enemy,50,cl.color);spawnParts(cl.x,cl.y,'#FAC775',6);return false;
    }
    return cl.life>0;
  });
}

function doSpawnClone(s,e){
  clones.push({x:s.x+(Math.random()-.5)*55,y:s.y+(Math.random()-.5)*55,
    vx:(Math.random()-.5)*1.5,vy:(Math.random()-.5)*1.5,r:11,life:260,color:s.color,out:s.out});
}

function spawnParts(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=1+Math.random()*4;
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-.8,life:16+Math.random()*18,color,size:1.5+Math.random()*3});
  }
}

function flashMsg(t){
  const el=document.getElementById('msg');el.textContent=t;el.style.opacity=1;
  setTimeout(()=>el.style.opacity=0,750);
}

// ─── DRAW ────────────────────────────────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,W,H);
  // checkerboard floor
  ctx.fillStyle='#1a1a30';ctx.fillRect(0,0,W,H);
  for(let i=0;i<W;i+=40)for(let j=0;j<H;j+=40){
    ctx.fillStyle='#16162a';ctx.fillRect(i,j,20,20);ctx.fillRect(i+20,j+20,20,20);
  }

  vfx.forEach(v=>drawVfx(v));
  ctx.globalAlpha=1;

  clones.forEach(cl=>{
    ctx.save();ctx.globalAlpha=.5;
    ctx.fillStyle=cl.color;ctx.strokeStyle=cl.out||'#000';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(cl.x,cl.y,cl.r,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle='#fff9';ctx.beginPath();ctx.arc(cl.x-cl.r*.25,cl.y-cl.r*.25,cl.r*.2,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });

  projs.forEach(p=>drawProj(p));

  parts.forEach(p=>{
    ctx.globalAlpha=p.life/34;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
  });ctx.globalAlpha=1;

  drawSphere(state.s1);drawSphere(state.s2);

  [state.s1,state.s2].forEach(s=>{
    s.dnums.forEach(dn=>{
      ctx.globalAlpha=dn.a;
      ctx.strokeStyle='#000';ctx.lineWidth=3;ctx.fillStyle=dn.val>150?'#FAC775':'#ff8888';
      ctx.font=`bold ${dn.val>150?15:13}px Nunito`;ctx.textAlign='center';ctx.textBaseline='top';
      ctx.strokeText('-'+dn.val,dn.x,dn.y);ctx.fillText('-'+dn.val,dn.x,dn.y);
    });ctx.globalAlpha=1;
  });
}

function drawVfx(v){
  const pct=1-v.life/v.maxLife;
  ctx.save();
  if(v.type==='beam'){
    const dx=v.tx-v.x,dy=v.ty-v.y,d=Math.sqrt(dx*dx+dy*dy)||1;
    const len=d*Math.min(1,pct*2.3);
    ctx.translate(v.x,v.y);ctx.rotate(Math.atan2(dy,dx));
    const bw=v.bw||18;
    ctx.globalAlpha=Math.max(0,1-pct*1.05);
    ctx.fillStyle=v.color+'aa';ctx.fillRect(0,-bw*.75,len,bw*1.5);
    ctx.fillStyle=v.color;ctx.fillRect(0,-bw/2,len,bw);
    ctx.fillStyle='#fff';ctx.fillRect(0,-bw*.15,len,bw*.3);
  }
  else if(v.type==='lightning'){
    ctx.globalAlpha=.9-pct*.5;
    for(let pass=0;pass<2;pass++){
      ctx.strokeStyle=pass===0?'#fff':'#AFA9EC';ctx.lineWidth=pass===0?1:2.5;
      ctx.beginPath();ctx.moveTo(v.x,v.y);
      for(let i=1;i<=8;i++){
        const t=i/8;ctx.lineTo(v.x+(v.tx-v.x)*t+(Math.random()-.5)*22,v.y+(v.ty-v.y)*t+(Math.random()-.5)*22);
      }ctx.lineTo(v.tx,v.ty);ctx.stroke();
    }
  }
  else if(v.type==='spiral'){
    const p=1-v.life/v.maxLife;
    const cx=v.ox+(v.tx-v.ox)*p,cy=v.oy+(v.ty-v.oy)*p;
    for(let ring=0;ring<3;ring++){
      ctx.globalAlpha=(.8-ring*.2)*(1-pct*.3);ctx.strokeStyle=v.color;ctx.lineWidth=3.5-ring;
      ctx.beginPath();ctx.arc(cx,cy,11+ring*9,0,Math.PI*2);ctx.stroke();
    }
    ctx.fillStyle='#fff';ctx.globalAlpha=(1-pct)*.9;ctx.beginPath();ctx.arc(cx,cy,8,0,Math.PI*2);ctx.fill();
  }
  else if(v.type==='burst'){
    const rad=(v.br||20)+pct*60;
    ctx.globalAlpha=(1-pct)*.8;ctx.strokeStyle=v.color;ctx.lineWidth=4;
    ctx.beginPath();ctx.arc(v.x,v.y,rad,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.globalAlpha=(1-pct)*.3;
    ctx.beginPath();ctx.arc(v.x,v.y,rad*.65,0,Math.PI*2);ctx.stroke();
  }
  else if(v.type==='charge'){
    const o=v.owner;
    for(let i=0;i<10;i++){
      const a=(i/10)*Math.PI*2+pct*14;const r=o.rad+8+pct*22;
      ctx.globalAlpha=(1-pct)*.85;ctx.fillStyle=v.color;
      ctx.beginPath();ctx.arc(o.x+Math.cos(a)*r,o.y+Math.sin(a)*r,4.5,0,Math.PI*2);ctx.fill();
    }
  }
  else if(v.type==='dodge'){
    ctx.globalAlpha=(1-pct)*.65;ctx.strokeStyle=v.color;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(v.x,v.y,22+pct*18,0,Math.PI*2);ctx.stroke();
  }
  else if(v.type==='slash_x'){
    ctx.globalAlpha=1-pct;ctx.strokeStyle=v.color;ctx.lineWidth=3;
    const s=20+pct*10;
    ctx.beginPath();ctx.moveTo(v.x-s,v.y-s);ctx.lineTo(v.x+s,v.y+s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(v.x+s,v.y-s);ctx.lineTo(v.x-s,v.y+s);ctx.stroke();
  }
  else if(v.type==='punch'){
    ctx.globalAlpha=1-pct;ctx.strokeStyle=v.color;ctx.lineWidth=4;
    ctx.beginPath();ctx.arc(v.x,v.y,8+pct*10,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='#fff';ctx.globalAlpha=(1-pct)*.5;ctx.beginPath();ctx.arc(v.x,v.y,4,0,Math.PI*2);ctx.fill();
  }
  else if(v.type==='hollow_purple'){
    const p=1-v.life/v.maxLife;
    const cx=v.x+(v.tx-v.x)*p,cy=v.y+(v.ty-v.y)*p;
    ctx.globalAlpha=.85-pct*.5;
    // Blue orb
    ctx.fillStyle='#85B7EB';ctx.beginPath();ctx.arc(cx-8,cy,10+pct*4,0,Math.PI*2);ctx.fill();
    // Red orb
    ctx.fillStyle='#E24B4A';ctx.beginPath();ctx.arc(cx+8,cy,10+pct*4,0,Math.PI*2);ctx.fill();
    // Merge flash
    if(pct>.7){ctx.fillStyle='#fff';ctx.globalAlpha=(pct-.7)/.3*0.9;ctx.beginPath();ctx.arc(cx,cy,18+pct*15,0,Math.PI*2);ctx.fill();}
  }
  else if(v.type==='shield_ring'){
    ctx.globalAlpha=(1-pct)*.75;ctx.strokeStyle=v.color;ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(v.x,v.y,v.rad+pct*10,0,Math.PI*2);ctx.stroke();
  }
  else if(v.type==='eye_glow'){
    ctx.globalAlpha=(1-pct)*.8;ctx.fillStyle=v.color;
    ctx.beginPath();ctx.arc(v.x,v.y,6+pct*8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.globalAlpha=(1-pct)*.4;ctx.beginPath();ctx.arc(v.x,v.y,3,0,Math.PI*2);ctx.fill();
  }
  else if(v.type==='sword_arc'){
    const dx=v.tx-v.x,dy=v.ty-v.y,ang=Math.atan2(dy,dx);
    ctx.globalAlpha=1-pct;ctx.strokeStyle=v.color;ctx.lineWidth=5;
    ctx.beginPath();for(let i=-5;i<=5;i++){
      const a=ang+i*.12,r=50+pct*20;
      i===-5?ctx.moveTo(v.x+Math.cos(a)*r,v.y+Math.sin(a)*r):ctx.lineTo(v.x+Math.cos(a)*r,v.y+Math.sin(a)*r);
    }ctx.stroke();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
  }
  else if(v.type==='time_stop'){
    ctx.globalAlpha=(1-pct)*.3;ctx.fillStyle=v.color;ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.globalAlpha=(1-pct)*.08;ctx.fillRect(0,0,W,H);
  }
  else if(v.type==='heal_ring'){
    ctx.globalAlpha=(1-pct)*.7;ctx.strokeStyle=v.color;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(v.x,v.y,v.rad||(20+pct*15),0,Math.PI*2);ctx.stroke();
  }
  else if(v.type==='erase'){
    ctx.globalAlpha=1-pct;ctx.strokeStyle=v.color;ctx.lineWidth=3;
    for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2;ctx.beginPath();ctx.moveTo(v.x,v.y);ctx.lineTo(v.x+Math.cos(a)*18,v.y+Math.sin(a)*18);ctx.stroke();}
  }
  else if(v.type==='disc'){
    ctx.globalAlpha=1-pct;ctx.strokeStyle=v.color;ctx.lineWidth=3;
    ctx.beginPath();ctx.ellipse((v.x+v.tx)/2,(v.y+v.ty)/2,Math.sqrt((v.tx-v.x)**2+(v.ty-v.y)**2)/2,8,Math.atan2(v.ty-v.y,v.tx-v.x),0,Math.PI*2);ctx.stroke();
  }
  else if(v.type==='string_web'){
    ctx.globalAlpha=.6-pct*.5;ctx.strokeStyle=v.color;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(v.x,v.y);ctx.lineTo(v.tx,v.ty);ctx.stroke();
    ctx.beginPath();ctx.moveTo(v.x,v.y+(Math.random()-.5)*10);ctx.lineTo(v.tx,v.ty+(Math.random()-.5)*10);ctx.stroke();
  }
  else if(v.type==='speed_ring'){
    ctx.globalAlpha=1-pct;ctx.strokeStyle=v.color;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(v.x,v.y,15+pct*25,0,Math.PI*2);ctx.stroke();
  }
  else if(v.type==='love_train'){
    const o=v.owner;ctx.globalAlpha=.25+Math.sin(Date.now()*.01)*.1;
    ctx.strokeStyle=v.color;ctx.lineWidth=4;ctx.beginPath();ctx.arc(o.x,o.y,o.rad+6,0,Math.PI*2);ctx.stroke();
  }
  else if(v.type==='bomb_icon'){
    const o=v.owner;ctx.globalAlpha=Math.abs(Math.sin(Date.now()*.02))*.8;
    ctx.fillStyle='#5F5E5A';ctx.beginPath();ctx.arc(o.x,o.y-o.rad-10,7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#EF9F27';ctx.beginPath();ctx.arc(o.x,o.y-o.rad-10,4,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();ctx.globalAlpha=1;
}

function drawProj(p){
  ctx.save();
  if(p.type==='cres'){
    ctx.translate(p.x,p.y);ctx.rotate(p.rot+p.off*.5);
    ctx.strokeStyle=p.color;ctx.lineWidth=4.5;ctx.beginPath();ctx.arc(0,0,p.rad,.35,Math.PI-.35);ctx.stroke();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.2;ctx.globalAlpha=.5;ctx.beginPath();ctx.arc(0,0,p.rad,.35,Math.PI-.35);ctx.stroke();
  } else if(p.type==='flame'){
    ctx.globalAlpha=.85;
    ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.rad,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#333';ctx.globalAlpha=.4;ctx.beginPath();ctx.arc(p.x+1,p.y-1,p.rad*.6,0,Math.PI*2);ctx.fill();
  } else if(p.type==='nail'){
    ctx.translate(p.x,p.y);ctx.rotate(p.rot||0);
    ctx.fillStyle=p.color;ctx.fillRect(-p.rad,-.2*p.rad,p.rad*2,p.rad*.4);
    ctx.fillStyle='#fff';ctx.fillRect(p.rad*.5,-.1*p.rad,p.rad*.5,p.rad*.2);
  } else if(p.type==='spin_ball'||p.type==='ball'){
    ctx.translate(p.x,p.y);ctx.rotate(p.rot||0);
    ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(0,0,p.rad,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=p.color==='#EF9F27'?'#633806':'#fff';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-p.rad,0);ctx.lineTo(p.rad,0);ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,p.rad,.1,Math.PI-.1);ctx.stroke();
    ctx.fillStyle='#fff5';ctx.beginPath();ctx.arc(-p.rad*.3,-p.rad*.3,p.rad*.25,0,Math.PI*2);ctx.fill();
  } else if(p.type==='bomb_proj'){
    ctx.fillStyle='#444';ctx.beginPath();ctx.arc(p.x,p.y,p.rad,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#EF9F27';ctx.beginPath();ctx.arc(p.x,p.y,p.rad*.5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#EF9F27';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(p.x,p.y-p.rad);ctx.lineTo(p.x+3,p.y-p.rad-8);ctx.stroke();
  } else if(p.type==='string_proj'){
    ctx.strokeStyle=p.color;ctx.lineWidth=2.5;ctx.globalAlpha=.8;
    ctx.beginPath();ctx.moveTo(p.x-p.vx*10,p.y-p.vy*10);ctx.lineTo(p.x,p.y);ctx.stroke();
    ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.rad,0,Math.PI*2);ctx.fill();
  } else {
    ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.rad,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.globalAlpha=.4;ctx.beginPath();ctx.arc(p.x,p.y,p.rad*.4,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();ctx.globalAlpha=1;
}

function drawSphere(s){
  const r=s.rad;
  ctx.save();ctx.translate(s.x,s.y);
  if(s.gearMode>0){
    const pulse=Math.sin(Date.now()*.015)*.5+.5;
    ctx.strokeStyle=s.color;ctx.lineWidth=3+pulse;
    for(let i=0;i<3;i++){ctx.globalAlpha=.2+i*.06;ctx.beginPath();ctx.arc(0,0,r+8+i*8,0,Math.PI*2);ctx.stroke();}
    ctx.globalAlpha=1;
  }
  if(s.loveTrain){
    ctx.strokeStyle='#B5D4F4';ctx.lineWidth=3;ctx.globalAlpha=.5+Math.sin(Date.now()*.012)*.3;
    ctx.beginPath();ctx.arc(0,0,r+5,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
  }
  if(s.dodging)ctx.globalAlpha=.4;
  ctx.fillStyle=s.hitFlash>0?'#fff':s.color;
  ctx.strokeStyle=s.out;ctx.lineWidth=3.5;
  ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();ctx.stroke();
  // spinning inner pattern
  ctx.rotate(s.ang);ctx.fillStyle=s.out+'40';
  for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2;ctx.beginPath();ctx.arc(Math.cos(a)*r*.55,Math.sin(a)*r*.55,r*.2,0,Math.PI*2);ctx.fill();}
  ctx.rotate(-s.ang);
  // shine
  ctx.fillStyle='#ffffff99';ctx.beginPath();ctx.arc(-r*.28,-r*.28,r*.22,0,Math.PI*2);ctx.fill();
  // label
  ctx.globalAlpha=1;ctx.fillStyle=s.out;
  const fs=s.sym.length>1?Math.round(r*.6):Math.round(r*.75);
  ctx.font=`bold ${fs}px Bangers,cursive`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(s.sym,0,1);
  ctx.restore();
  // hp bar below
  const hw=r*2.3,hh=8,hx=s.x-hw/2,hy=s.y+r+4;
  ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(hx,hy,hw,hh);
  const fr=Math.max(0,s.hp/s.maxHp);
  ctx.fillStyle=fr>.5?'#1D9E75':fr>.25?'#EF9F27':'#E24B4A';
  ctx.fillRect(hx,hy,hw*fr,hh);
  ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=1;ctx.strokeRect(hx,hy,hw,hh);
  // hp number
  ctx.strokeStyle='#000';ctx.lineWidth=2.5;ctx.fillStyle=fr>.5?'#9FE1CB':fr>.25?'#FAC775':'#F09595';
  ctx.font='bold 11px Nunito';ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.strokeText(Math.ceil(s.hp),s.x,hy-1);ctx.fillText(Math.ceil(s.hp),s.x,hy-1);
}

function updUI(s1,s2){
  [[s1,'1'],[s2,'2']].forEach(([s,n])=>{
    const fr=Math.max(0,s.hp/s.maxHp);
    document.getElementById('hb'+n).style.width=(fr*100)+'%';
    document.getElementById('hs'+n).textContent='HP: '+Math.ceil(s.hp)+' / '+s.maxHp;
    const cdov=document.getElementById('cdov'+n);
    if(cdov)cdov.style.width=(Math.max(0,s.spCd/s.spMaxCd)*100)+'%';
  });
}

function endGame(s1,s2){
  running=false;
  const w=s1.hp>s2.hp?s1:s2;
  const def=CHARS[w.cidx];
  const ov=document.getElementById('ov');ov.style.display='flex';
  ov.innerHTML=`
    <h2 style="color:${def.color}">${def.sym} ${def.label} WINS!</h2>
    <p style="color:#888">${def.label} is victorious &mdash; ${Math.ceil(w.hp)} HP remaining</p>
    <button onclick="resetMenu()" style="font-family:Bangers,cursive;font-size:18px;letter-spacing:2px;padding:8px 32px;background:#1D9E75;color:#fff;border:none;border-radius:7px;cursor:pointer;margin-top:8px">REMATCH</button>
  `;
}

function resetMenu(){
  running=false;parts=[];projs=[];clones=[];vfx=[];ctx.clearRect(0,0,W,H);
  const ov=document.getElementById('ov');ov.style.display='flex';
  ov.innerHTML=`
    <h2>ANIME SPHERES</h2>
    <p>Fully automatic battle &bull; 10x HP &bull; Animated abilities</p>
    <div class="picks-row">
      <div class="pcol"><span>Fighter 1</span><div class="pgrid" id="pg1"></div></div>
      <div class="pcol"><span>Fighter 2</span><div class="pgrid" id="pg2"></div></div>
    </div>
    <button id="fight-btn" onclick="startGame()">FIGHT!</button>
  `;
  buildPicks();
}
